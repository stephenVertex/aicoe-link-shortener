<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aicoe.fit - File a Bug Report</title>
  <script src="./supabase.min.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #333;
      --text-muted: #666;
      --text-faint: #888;
      --text-title: #111;
      --card-bg: white;
      --card-shadow: rgba(0,0,0,0.08);
      --border: #e0e0e0;
      --border-light: #e5e7eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --badge-bg: #dbeafe;
      --badge-text: #1e40af;
      --btn-secondary-bg: #e5e7eb;
      --btn-secondary-text: #374151;
      --btn-secondary-hover: #d1d5db;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
      --success-bg: #dcfce7;
      --success-border: #86efac;
      --success-text: #166534;
      --warn-bg: #fef9c3;
      --warn-border: #fde68a;
      --warn-text: #92400e;
      --stat-num: #2563eb;
      --input-bg: white;
      --input-border: #d1d5db;
    }
    html[data-theme="synthwave-dark"] {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --text-muted: #a0a0b8;
      --text-faint: #707088;
      --text-title: #ff6ec7;
      --card-bg: #16213e;
      --card-shadow: rgba(0,0,0,0.4);
      --border: #2a2a4a;
      --border-light: #252545;
      --accent: #00d4ff;
      --accent-hover: #33ddff;
      --badge-bg: #1a1a3e;
      --badge-text: #00d4ff;
      --btn-secondary-bg: #252545;
      --btn-secondary-text: #e0e0e0;
      --btn-secondary-hover: #2a2a5a;
      --error-bg: #2e1a1a;
      --error-border: #6a3a3a;
      --error-text: #ff6ec7;
      --success-bg: #1a2e2a;
      --success-border: #72f1b8;
      --success-text: #72f1b8;
      --warn-bg: #2e2a1a;
      --warn-border: #6a5a2a;
      --warn-text: #fbbf24;
      --stat-num: #ff6ec7;
      --input-bg: #1a1a3e;
      --input-border: #3a3a5a;
    }
    html[data-theme="solarized-dark"] {
      --bg: #002b36;
      --text: #93a1a1;
      --text-muted: #839496;
      --text-faint: #657b83;
      --text-title: #b58900;
      --card-bg: #073642;
      --card-shadow: rgba(0,0,0,0.28);
      --border: #0d4a59;
      --border-light: #114b59;
      --accent: #268bd2;
      --accent-hover: #3aa0e8;
      --badge-bg: #11333d;
      --badge-text: #6cbeff;
      --btn-secondary-bg: #11404d;
      --btn-secondary-text: #93a1a1;
      --btn-secondary-hover: #15505f;
      --error-bg: #3a2323;
      --error-border: #6d3f3f;
      --error-text: #dc322f;
      --success-bg: #123f40;
      --success-border: #2aa198;
      --success-text: #7ee5dd;
      --warn-bg: #3a3223;
      --warn-border: #6d5f3f;
      --warn-text: #b58900;
      --stat-num: #b58900;
      --input-bg: #073642;
      --input-border: #114b59;
    }
    html[data-theme="solarized-light"] {
      --bg: #fdf6e3;
      --text: #586e75;
      --text-muted: #657b83;
      --text-faint: #93a1a1;
      --text-title: #b58900;
      --card-bg: #fffdf4;
      --card-shadow: rgba(88,110,117,0.12);
      --border: #eee8d5;
      --border-light: #e6dfca;
      --accent: #268bd2;
      --accent-hover: #1f76b4;
      --badge-bg: #e8f1f3;
      --badge-text: #268bd2;
      --btn-secondary-bg: #eee8d5;
      --btn-secondary-text: #586e75;
      --btn-secondary-hover: #e6dfca;
      --error-bg: #fff1f0;
      --error-border: #f3c7c2;
      --error-text: #b8332f;
      --success-bg: #e6f4ef;
      --success-border: #9dd7c5;
      --success-text: #20756d;
      --warn-bg: #fef9c3;
      --warn-border: #fde68a;
      --warn-text: #92400e;
      --stat-num: #b58900;
      --input-bg: #fffdf4;
      --input-border: #e6dfca;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
    header h1 { font-size: 1.4em; font-weight: 700; }
    header .header-left { display: flex; align-items: center; gap: 0; }
    header .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.9em; color: var(--text-muted); }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-sm { padding: 4px 10px; font-size: 0.8em; }
    .btn-secondary { background: var(--btn-secondary-bg); color: var(--btn-secondary-text); }
    .btn-secondary:hover { background: var(--btn-secondary-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .nav-links { display: flex; align-items: center; gap: 4px; margin-left: 16px; }
    .nav-link { padding: 4px 12px; font-size: 0.85em; font-weight: 500; color: var(--text-muted); text-decoration: none; border-radius: 6px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .nav-link:hover { background: var(--btn-secondary-hover); color: var(--text); }
    .nav-link.active { background: var(--accent); color: white; border-color: var(--accent); }
    .theme-control { display: inline-flex; align-items: center; gap: 6px; }
    .theme-label { font-size: 0.75em; color: var(--text-faint); }
    .theme-select { background: var(--card-bg); border: 1px solid var(--border-light); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 0.8em; }
    .loading { text-align: center; padding: 60px; color: var(--text-faint); }
    .stat-card { background: var(--card-bg); border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px var(--card-shadow); flex: 1; text-align: center; }
    .stat-card .num { font-size: 2em; font-weight: 700; color: var(--stat-num); }
    .stat-card .label { font-size: 0.85em; color: var(--text-muted); margin-top: 4px; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .filter-bar select { background: var(--card-bg); border: 1px solid var(--border-light); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 0.85em; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-faint); }

    /* Form styles */
    .form-card { background: var(--card-bg); border-radius: 8px; padding: 20px; margin-bottom: 24px; box-shadow: 0 1px 3px var(--card-shadow); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.9em; font-weight: 600; color: var(--text-title); margin-bottom: 6px; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.9em;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }

    /* Table styles */
    .bug-table { width: 100%; border-collapse: collapse; font-size: 0.9em; background: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px var(--card-shadow); }
    .bug-table th { padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text-title); background: var(--border-faint); border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
    .bug-table th:hover { background: var(--border-light); }
    .bug-table th .sort-icon { font-size: 0.75em; margin-left: 4px; color: var(--text-faint); }
    .bug-table th.sort-asc .sort-icon::after { content: ' ▲'; color: var(--accent); }
    .bug-table th.sort-desc .sort-icon::after { content: ' ▼'; color: var(--accent); }
    .bug-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); vertical-align: top; }
    .bug-table tr:hover td { background: var(--border-faint); }
    .bug-table tr:last-child td { border-bottom: none; }
    .bug-table .col-title { min-width: 200px; }
    .bug-table .col-status { width: 100px; }
    .bug-table .col-time { width: 140px; }
    .bug-table .col-source { width: 110px; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: 600; text-transform: capitalize; }
    .status-open { background: var(--badge-bg); color: var(--badge-text); }
    .status-investigating { background: var(--warn-bg); color: var(--warn-text); border: 1px solid var(--warn-border); }
    .status-fixed { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
    .status-wontfix { background: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border); }
    .desc-preview { color: var(--text-muted); font-size: 0.9em; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .desc-preview.expanded { white-space: normal; overflow: visible; }
    .expand-btn { color: var(--accent); cursor: pointer; font-size: 0.85em; }
    .expand-btn:hover { text-decoration: underline; }

    @media (max-width: 720px) {
      .stats-row { flex-wrap: wrap; }
      .filter-bar { flex-wrap: wrap; }
      header { align-items: flex-start; }
      header .header-left { flex-wrap: wrap; }
      .form-row { flex-direction: column; }
      .bug-table { font-size: 0.82em; }
      .bug-table th, .bug-table td { padding: 6px 8px; }
      .bug-table .col-time, .bug-table .col-source { display: none; }
      .desc-preview { max-width: 120px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="app"><div class="loading">Loading...</div></div>
  </div>

  <script>
    const THEME_KEY = 'theme';

    function resolveTheme(theme) {
      if (theme === 'dark') return 'synthwave-dark';
      if (theme === 'system') {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'synthwave-dark' : 'light';
      }
      return theme || 'synthwave-dark';
    }

    function applyTheme(theme) {
      const resolved = resolveTheme(theme);
      if (resolved === 'light') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', resolved);
      }
    }

    function setTheme(theme) {
      localStorage.setItem(THEME_KEY, theme);
      applyTheme(theme);
    }

    function getSavedTheme() {
      const saved = localStorage.getItem(THEME_KEY) || 'synthwave-dark';
      return saved === 'dark' ? 'synthwave-dark' : saved;
    }

    function renderThemeControl() {
      const currentTheme = getSavedTheme();
      const options = [
        ['synthwave-dark', 'Synthwave'],
        ['solarized-dark', 'Solarized Dark'],
        ['solarized-light', 'Solarized Light'],
        ['light', 'Light'],
        ['system', 'System'],
      ];
      return '<div class="theme-control"><span class="theme-label">Theme</span><select class="theme-select" onchange="setTheme(this.value)">' +
        options.map(([value, label]) => '<option value="' + value + '"' + (currentTheme === value ? ' selected' : '') + '>' + label + '</option>').join('') +
        '</select></div>';
    }

    function renderNavLinks() {
      return '<div class="nav-links">' +
        '<a class="nav-link" href="./index.html">Links</a>' +
        '<a class="nav-link" href="./index.html#/analytics">Analytics</a>' +
        '<a class="nav-link" href="./sync.html">Sync</a>' +
        '<a class="nav-link" href="./video-search.html">Video Search</a>' +
        '<a class="nav-link" href="./changelog.html">Changelog</a>' +
        '<a class="nav-link active" href="./file-bug.html">File Bug</a>' +
        '</div>';
    }

    applyTheme(getSavedTheme());

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (getSavedTheme() === 'system') applyTheme('system');
    });

    const SUPABASE_URL = 'https://dumhbtxskncofwwzrmfx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bWhidHhza25jb2Z3d3pybWZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTk0MzcsImV4cCI6MjA4ODkzNTQzN30.kYLAKAtgA18pyQxp1RzmPnmySdXtxDrTkgs5qlB2fXY';

    let sb;
    try {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      document.getElementById('app').innerHTML = '<div class="error-box">Failed to initialize Supabase client: <code>' + e.message + '</code></div>';
      throw e;
    }

    const app = document.getElementById('app');
    let currentPerson = null;
    let bugReports = [];
    let filterStatus = 'all';
    let sortColumn = 'created_at';
    let sortDirection = 'desc';
    let expandedDesc = new Set();
    let filingBug = false;
    let fileNotice = '';

    function formatTime(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.toLocaleString('en-US', {
        month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit',
        hour12: true,
      });
    }

    function escapeAttr(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function loadBugReports() {
      const { data, error } = await sb
        .from('bug_reports')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(100);
      if (error) throw error;
      bugReports = data || [];
    }

    async function fileBugReport(title, description, source) {
      if (filingBug) return;
      filingBug = true;
      fileNotice = '';
      renderPage();

      try {
        const { data: { session } } = await sb.auth.getSession();
        const resp = await fetch(SUPABASE_URL + '/functions/v1/manage-content', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + (session ? session.access_token : ''),
          },
          body: JSON.stringify({
            action: 'file-bug-report',
            title,
            description,
            source,
          }),
        });
        const result = await resp.json();
        if (!resp.ok) throw new Error(result.error || 'Failed to file bug report');

        fileNotice = 'Bug report filed: ' + result.bug_report.id;
        document.getElementById('bugTitle').value = '';
        document.getElementById('bugDescription').value = '';
        await loadBugReports();
      } catch (err) {
        fileNotice = 'Error: ' + err.message;
        console.error(err);
      } finally {
        filingBug = false;
        renderPage();
        setTimeout(() => { fileNotice = ''; renderPage(); }, 6000);
      }
    }

    function getSortValue(br, col) {
      switch (col) {
        case 'title': return br.title || '';
        case 'status': return br.status || '';
        case 'source': return br.source || '';
        case 'created_at': return br.created_at || '';
        default: return '';
      }
    }

    function sortBugs(list) {
      return list.slice().sort((a, b) => {
        const va = getSortValue(a, sortColumn);
        const vb = getSortValue(b, sortColumn);
        let cmp = String(va).localeCompare(String(vb));
        return sortDirection === 'asc' ? cmp : -cmp;
      });
    }

    function toggleSort(col) {
      if (sortColumn === col) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortColumn = col;
        sortDirection = 'desc';
      }
      renderPage();
    }

    function toggleDesc(id) {
      if (expandedDesc.has(id)) {
        expandedDesc.delete(id);
      } else {
        expandedDesc.add(id);
      }
      renderPage();
    }

    function renderSortHeader(label, col, cls) {
      const isActive = sortColumn === col;
      const sortClass = isActive ? (sortDirection === 'asc' ? 'sort-asc' : 'sort-desc') : '';
      return '<th class="' + (cls || '') + ' ' + sortClass + '" onclick="toggleSort(\'' + col + '\')">' +
        escapeAttr(label) + '<span class="sort-icon"></span></th>';
    }

    function renderPage() {
      if (!currentPerson) {
        app.innerHTML = '<div class="loading">Loading...</div>';
        return;
      }

      let filtered = bugReports;
      if (filterStatus !== 'all') {
        filtered = filtered.filter(br => br.status === filterStatus);
      }
      filtered = sortBugs(filtered);

      const total = bugReports.length;
      const openCount = bugReports.filter(br => br.status === 'open').length;
      const investigatingCount = bugReports.filter(br => br.status === 'investigating').length;
      const fixedCount = bugReports.filter(br => br.status === 'fixed').length;

      let h = `
        <header>
          <div class="header-left">
            <h1>aicoe.fit</h1>
            ${renderNavLinks()}
          </div>
          <div class="user-info">
            ${currentPerson.name || currentPerson.email}
            <button class="btn btn-sm btn-secondary" onclick="signOut()">Sign out</button>
            ${renderThemeControl()}
          </div>
        </header>
        ${fileNotice ? '<div style="background:var(--success-bg);border:1px solid var(--success-border);color:var(--success-text);padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:0.9em;">' + escapeAttr(fileNotice) + '</div>' : ''}

        <div class="stats-row">
          <div class="stat-card">
            <div class="num">${total}</div>
            <div class="label">Total</div>
          </div>
          <div class="stat-card">
            <div class="num">${openCount}</div>
            <div class="label">Open</div>
          </div>
          <div class="stat-card">
            <div class="num">${investigatingCount}</div>
            <div class="label">Investigating</div>
          </div>
          <div class="stat-card">
            <div class="num">${fixedCount}</div>
            <div class="label">Fixed</div>
          </div>
        </div>

        <div class="form-card">
          <h3 style="font-size:1.1em;font-weight:600;color:var(--text-title);margin-bottom:16px;">File a Bug Report</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="bugTitle">Title</label>
              <input type="text" id="bugTitle" placeholder="Short summary of the bug">
            </div>
            <div class="form-group">
              <label for="bugSource">Source</label>
              <select id="bugSource">
                <option value="admin-dashboard">Admin Dashboard</option>
                <option value="cli">CLI</option>
                <option value="edge-function">Edge Function</option>
                <option value="worker">Cloudflare Worker</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="bugDescription">Description</label>
            <textarea id="bugDescription" placeholder="Describe the bug in detail — what happened, what you expected, steps to reproduce..."></textarea>
          </div>
          <button class="btn btn-primary btn-sm" onclick="submitBug()" ${filingBug ? 'disabled' : ''}>${filingBug ? 'Filing...' : 'File Bug Report'}</button>
        </div>

        <div class="filter-bar">
          <select onchange="filterStatus=this.value;renderPage()">
            <option value="all"${filterStatus === 'all' ? ' selected' : ''}>All Statuses</option>
            <option value="open"${filterStatus === 'open' ? ' selected' : ''}>Open</option>
            <option value="investigating"${filterStatus === 'investigating' ? ' selected' : ''}>Investigating</option>
            <option value="fixed"${filterStatus === 'fixed' ? ' selected' : ''}>Fixed</option>
            <option value="wontfix"${filterStatus === 'wontfix' ? ' selected' : ''}>Wontfix</option>
          </select>
        </div>
      `;

      if (filtered.length === 0) {
        h += '<div class="empty-state">No bug reports yet. File one above!</div>';
      } else {
        h += '<table class="bug-table">';
        h += '<thead><tr>' +
          renderSortHeader('Status', 'status', 'col-status') +
          renderSortHeader('Title', 'title', 'col-title') +
          renderSortHeader('Source', 'source', 'col-source') +
          renderSortHeader('Filed', 'created_at', 'col-time') +
          '<th>Description</th>' +
          '</tr></thead>';
        h += '<tbody>';

        for (const br of filtered) {
          const statusClass = 'status-' + br.status;
          const isExpanded = expandedDesc.has(br.id);

          h += '<tr>';
          h += '<td class="col-status"><span class="status-badge ' + statusClass + '">' + escapeAttr(br.status) + '</span></td>';
          h += '<td class="col-title"><strong>' + escapeAttr(br.title) + '</strong></td>';
          h += '<td class="col-source"><span style="text-transform:capitalize;">' + escapeAttr(br.source.replace(/-/g, ' ')) + '</span></td>';
          h += '<td class="col-time">' + formatTime(br.created_at) + '</td>';
          h += '<td>';
          h += '<div class="desc-preview' + (isExpanded ? ' expanded' : '') + '">' + escapeAttr(br.description) + '</div>';
          if (br.description && br.description.length > 60) {
            h += '<span class="expand-btn" onclick="toggleDesc(\'' + br.id + '\')">' + (isExpanded ? 'less' : 'more') + '</span>';
          }
          h += '</td>';
          h += '</tr>';
        }

        h += '</tbody></table>';
      }

      app.innerHTML = h;
    }

    function submitBug() {
      const title = document.getElementById('bugTitle').value.trim();
      const description = document.getElementById('bugDescription').value.trim();
      const source = document.getElementById('bugSource').value;
      if (!title) { alert('Title is required'); return; }
      if (!description) { alert('Description is required'); return; }
      fileBugReport(title, description, source);
    }

    async function signOut() {
      await sb.auth.signOut();
      currentPerson = null;
      window.location.href = './index.html';
    }

    async function init() {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          const { data: person, error: personErr } = await sb.rpc('get_or_create_person');
          if (personErr) throw personErr;
          currentPerson = person;
          await loadBugReports();
          renderPage();
        } else {
          window.location.href = './index.html';
        }

        sb.auth.onAuthStateChange(async (event, session) => {
          if (event === 'SIGNED_IN' && session) {
            const { data: person } = await sb.rpc('get_or_create_person');
            currentPerson = person;
            await loadBugReports();
            renderPage();
          } else if (event === 'SIGNED_OUT') {
            currentPerson = null;
            window.location.href = './index.html';
          }
        });
      } catch (err) {
        app.innerHTML = '<div class="error-box" style="background:var(--error-bg);border:1px solid var(--error-border);color:var(--error-text);padding:16px;border-radius:8px;">Error: <code>' + err.message + '</code></div>';
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
