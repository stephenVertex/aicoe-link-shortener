<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aicoe.fit - Link Dashboard</title>
  <script src="./supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #333;
      --text-muted: #666;
      --text-faint: #888;
      --text-title: #111;
      --card-bg: white;
      --card-shadow: rgba(0,0,0,0.08);
      --border: #e0e0e0;
      --border-light: #e5e7eb;
      --border-faint: #f3f4f6;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --author: #6b21a8;
      --clicks: #059669;
      --badge-bg: #dbeafe;
      --badge-text: #1e40af;
      --mine-bg: #eff6ff;
      --btn-secondary-bg: #e5e7eb;
      --btn-secondary-text: #374151;
      --btn-secondary-hover: #d1d5db;
      --copy-btn-border: #d1d5db;
      --copy-btn-hover: #f3f4f6;
      --copied-bg: #dcfce7;
      --copied-border: #86efac;
      --copied-text: #166534;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
      --error-code-bg: #fee2e2;
      --google-bg: white;
      --google-border: #dadce0;
      --google-text: #3c4043;
      --google-hover: #f8f9fa;
      --stat-num: #2563eb;
    }
    html[data-theme="synthwave-dark"] {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --text-muted: #a0a0b8;
      --text-faint: #707088;
      --text-title: #ff6ec7;
      --card-bg: #16213e;
      --card-shadow: rgba(0,0,0,0.4);
      --border: #2a2a4a;
      --border-light: #252545;
      --border-faint: #202040;
      --accent: #00d4ff;
      --accent-hover: #33ddff;
      --author: #bf6aff;
      --clicks: #72f1b8;
      --badge-bg: #1a1a3e;
      --badge-text: #00d4ff;
      --mine-bg: #1a2438;
      --btn-secondary-bg: #252545;
      --btn-secondary-text: #e0e0e0;
      --btn-secondary-hover: #2a2a5a;
      --copy-btn-border: #3a3a5a;
      --copy-btn-hover: #252545;
      --copied-bg: #1a2e2a;
      --copied-border: #72f1b8;
      --copied-text: #72f1b8;
      --error-bg: #2e1a1a;
      --error-border: #6a3a3a;
      --error-text: #ff6ec7;
      --error-code-bg: #3a1a2a;
      --google-bg: #16213e;
      --google-border: #3a3a5a;
      --google-text: #e0e0e0;
      --google-hover: #1a2a4e;
      --stat-num: #ff6ec7;
    }
    html[data-theme="solarized-dark"] {
      --bg: #002b36;
      --text: #93a1a1;
      --text-muted: #839496;
      --text-faint: #657b83;
      --text-title: #b58900;
      --card-bg: #073642;
      --card-shadow: rgba(0,0,0,0.28);
      --border: #0d4a59;
      --border-light: #114b59;
      --border-faint: #0c4250;
      --accent: #268bd2;
      --accent-hover: #3aa0e8;
      --author: #d33682;
      --clicks: #2aa198;
      --badge-bg: #11333d;
      --badge-text: #6cbeff;
      --mine-bg: #0c3640;
      --btn-secondary-bg: #11404d;
      --btn-secondary-text: #93a1a1;
      --btn-secondary-hover: #15505f;
      --copy-btn-border: #1a5564;
      --copy-btn-hover: #11404d;
      --copied-bg: #123f40;
      --copied-border: #2aa198;
      --copied-text: #7ee5dd;
      --error-bg: #3a2323;
      --error-border: #6d3f3f;
      --error-text: #dc322f;
      --error-code-bg: #4a2b2b;
      --google-bg: #073642;
      --google-border: #1a5564;
      --google-text: #93a1a1;
      --google-hover: #11404d;
      --stat-num: #b58900;
    }
    html[data-theme="solarized-light"] {
      --bg: #fdf6e3;
      --text: #586e75;
      --text-muted: #657b83;
      --text-faint: #93a1a1;
      --text-title: #b58900;
      --card-bg: #fffdf4;
      --card-shadow: rgba(88,110,117,0.12);
      --border: #eee8d5;
      --border-light: #e6dfca;
      --border-faint: #f2ecdc;
      --accent: #268bd2;
      --accent-hover: #1f76b4;
      --author: #d33682;
      --clicks: #2aa198;
      --badge-bg: #e8f1f3;
      --badge-text: #268bd2;
      --mine-bg: #f3f0df;
      --btn-secondary-bg: #eee8d5;
      --btn-secondary-text: #586e75;
      --btn-secondary-hover: #e6dfca;
      --copy-btn-border: #d8d2c0;
      --copy-btn-hover: #f2ecdc;
      --copied-bg: #e6f4ef;
      --copied-border: #9dd7c5;
      --copied-text: #20756d;
      --error-bg: #fff1f0;
      --error-border: #f3c7c2;
      --error-text: #b8332f;
      --error-code-bg: #fde6e3;
      --google-bg: #fffdf4;
      --google-border: #d8d2c0;
      --google-text: #586e75;
      --google-hover: #f6f0de;
      --stat-num: #b58900;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
    header h1 { font-size: 1.4em; font-weight: 700; }
    header .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.9em; color: var(--text-muted); }
    header .user-info img { width: 32px; height: 32px; border-radius: 50%; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--btn-secondary-bg); color: var(--btn-secondary-text); }
    .btn-secondary:hover { background: var(--btn-secondary-hover); }
    .btn-sm { padding: 4px 10px; font-size: 0.8em; }
    .btn-google { background: var(--google-bg); border: 1px solid var(--google-border); color: var(--google-text); padding: 12px 24px; font-size: 1em; display: flex; align-items: center; gap: 10px; margin: 40vh auto 0; border-radius: 6px; cursor: pointer; }
    .btn-google:hover { background: var(--google-hover); box-shadow: 0 1px 3px var(--card-shadow); }
    .btn-google svg { width: 20px; height: 20px; }
    .login-panel .btn-google { margin: 0; width: 100%; justify-content: center; }
    .login-shell { display: grid; grid-template-columns: 1.2fr 0.9fr; gap: 24px; align-items: center; min-height: calc(100vh - 140px); }
    .login-hero { background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(191,106,255,0.16)); border: 1px solid var(--border-light); border-radius: 20px; padding: 16px; box-shadow: 0 20px 50px var(--card-shadow); }
    .login-image { width: 100%; display: block; border-radius: 14px; }
    .login-panel { background: var(--card-bg); border: 1px solid var(--border-light); border-radius: 20px; padding: 28px; box-shadow: 0 18px 40px var(--card-shadow); }
    .login-eyebrow { font-size: 0.75em; letter-spacing: 0.16em; text-transform: uppercase; color: var(--author); margin-bottom: 10px; }
    .login-title { font-size: 2em; line-height: 1.05; color: var(--text-title); margin-bottom: 12px; }
    .login-copy { color: var(--text-muted); font-size: 0.96em; line-height: 1.5; margin-bottom: 20px; }
    .login-points { display: grid; gap: 10px; margin-bottom: 24px; }
    .login-point { display: flex; gap: 10px; align-items: flex-start; color: var(--text); font-size: 0.9em; }
    .login-point .dot { color: var(--accent); font-size: 1.1em; line-height: 1; margin-top: 2px; }
    .toggle-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
    .filter-input { min-width: 260px; flex: 1; max-width: 420px; background: var(--card-bg); border: 1px solid var(--border-light); color: var(--text); border-radius: 10px; padding: 9px 12px; font-size: 0.9em; }
    .filter-input::placeholder { color: var(--text-faint); }
    .filter-meta { font-size: 0.82em; color: var(--text-muted); margin-left: auto; }
    .link-card { background: var(--card-bg); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 3px var(--card-shadow); }
    .link-card h3 { font-size: 1.1em; margin-bottom: 4px; }
    .link-card .title { font-size: 0.95em; color: var(--text-title); margin-bottom: 2px; }
    .link-card .meta { font-size: 0.8em; color: var(--text-faint); margin-bottom: 8px; }
    .link-card .meta .author { color: var(--author); font-weight: 500; }
    .link-card .dest { font-size: 0.85em; color: var(--text-muted); margin-bottom: 12px; word-break: break-all; }
    .link-card .dest a { color: var(--accent); text-decoration: none; }
    .link-card .dest a:hover { text-decoration: underline; }
    .copy-table-bar { background: var(--card-bg); border-radius: 8px; padding: 12px 20px; margin-bottom: 16px; box-shadow: 0 1px 3px var(--card-shadow); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .copy-table-bar .label { font-size: 0.9em; font-weight: 500; color: var(--text-muted); }
    .sources-panel { background: var(--card-bg); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 3px var(--card-shadow); }
    .sources-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .sources-title { font-size: 1em; font-weight: 600; color: var(--text-title); }
    .sources-subtitle { font-size: 0.8em; color: var(--text-muted); }
    .source-chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .source-chip { display: inline-flex; align-items: center; gap: 8px; background: var(--btn-secondary-bg); color: var(--text); border: 1px solid var(--border-light); border-radius: 999px; padding: 6px 10px; font-size: 0.82em; }
    .source-chip .emoji { font-size: 1.1em; }
    .source-chip .meta { color: var(--text-muted); }
    .source-chip .remove { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 0.95em; line-height: 1; }
    .source-chip .remove:hover { color: var(--text); }
    .source-form { display: grid; grid-template-columns: 72px 1.1fr 1fr 1fr; gap: 10px; margin-top: 12px; }
    .source-form .wide { grid-column: span 2; }
    .source-form .full { grid-column: 1 / -1; }
    .source-input { background: var(--bg); border: 1px solid var(--border-light); color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 0.86em; }
    .source-input::placeholder { color: var(--text-faint); }
    .source-actions { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
    .source-hint { font-size: 0.78em; color: var(--text-muted); }
    .source-explainer { display: grid; gap: 8px; margin-top: 12px; padding: 12px 14px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border-light); }
    .source-explainer-title { font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--author); font-weight: 700; }
    .source-explainer p, .source-explainer li { font-size: 0.83em; color: var(--text-muted); line-height: 1.45; }
    .source-explainer ul { margin-left: 18px; display: grid; gap: 4px; }
    .source-notice { margin-top: 10px; padding: 10px 12px; border-radius: 10px; background: var(--copied-bg); border: 1px solid var(--copied-border); color: var(--copied-text); font-size: 0.84em; }
    .source-pill { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
    .brand-icon { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; }
    .brand-icon svg { width: 12px; height: 12px; display: block; }
    .person-btn { padding: 4px 12px; border: 1px solid var(--copy-btn-border); border-radius: 4px; background: var(--card-bg); cursor: pointer; font-size: 0.8em; color: var(--btn-secondary-text); transition: all 0.15s; }
    .person-btn:hover { background: var(--copy-btn-hover); border-color: var(--text-muted); }
    .person-btn.copied { background: var(--copied-bg); border-color: var(--copied-border); color: var(--copied-text); }
    .variant-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    .variant-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border-light); color: var(--text-muted); font-weight: 500; }
    .variant-table td { padding: 6px 8px; border-bottom: 1px solid var(--border-faint); }
    .variant-table tr.mine { background: var(--mine-bg); }
    .short-url-wrap { display: inline-flex; align-items: center; gap: 2px; flex-wrap: nowrap; vertical-align: middle; }
    .short-url { font-family: monospace; font-size: 0.9em; color: var(--accent); text-decoration: none; white-space: nowrap; }
    .short-url:hover { text-decoration: underline; }
    .copy-btn { background: none; border: 1px solid var(--copy-btn-border); border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 0.8em; color: var(--text-muted); }
    .copy-btn:hover { background: var(--copy-btn-hover); }
    .copy-btn.copied { background: var(--copied-bg); border-color: var(--copied-border); color: var(--copied-text); }
    .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; padding: 0; }
    .icon-btn svg { width: 15px; height: 15px; fill: currentColor; }
    .clicks { font-weight: 600; color: var(--clicks); }
    .loading { text-align: center; padding: 60px; color: var(--text-faint); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: 500; }
    .badge-you { background: var(--badge-bg); color: var(--badge-text); }
    #app { min-height: 60vh; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px var(--card-shadow); flex: 1; text-align: center; }
    .stat-card .num { font-size: 2em; font-weight: 700; color: var(--stat-num); }
    .stat-card .label { font-size: 0.85em; color: var(--text-muted); margin-top: 4px; }
    .analytics-panel { background: var(--card-bg); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 3px var(--card-shadow); }
    .analytics-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .analytics-title { font-size: 1em; font-weight: 600; color: var(--text-title); }
    .analytics-filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .analytics-select, .analytics-input { background: var(--bg); border: 1px solid var(--border-light); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 0.85em; }
    .chart-container { position: relative; height: 250px; width: 100%; }
    .error-box { background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 8px; padding: 16px; margin: 20px 0; color: var(--error-text); }
    .error-box code { background: var(--error-code-bg); padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
    .theme-control { display: inline-flex; align-items: center; gap: 6px; }
    .theme-label { font-size: 0.75em; color: var(--text-faint); }
    .theme-select { background: var(--card-bg); border: 1px solid var(--border-light); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 0.8em; }
    .filter-input-wrap { position: relative; min-width: 260px; flex: 1; max-width: 420px; }
    .filter-input-wrap .filter-input { min-width: 0; max-width: none; width: 100%; }
    .author-dropdown { position: absolute; top: 100%; left: 0; right: 0; z-index: 100; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; max-height: 220px; overflow-y: auto; box-shadow: 0 4px 16px var(--card-shadow); margin-top: 4px; }
    .author-dropdown-item { padding: 8px 12px; cursor: pointer; font-size: 0.9em; color: var(--text); }
    .author-dropdown-item:hover, .author-dropdown-item.active { background: var(--mine-bg); color: var(--accent); }
    @media (max-width: 720px) {
      .login-shell { grid-template-columns: 1fr; min-height: auto; }
      .login-panel { padding: 22px; }
      .login-title { font-size: 1.7em; }
      .stats-row { flex-wrap: wrap; }
      .toggle-bar { flex-wrap: wrap; }
      .filter-input-wrap { max-width: none; min-width: 0; width: 100%; }
      .filter-input { max-width: none; min-width: 0; width: 100%; }
      .filter-meta { width: 100%; margin-left: 0; }
      .source-form { grid-template-columns: 1fr; }
      .source-form .wide, .source-form .full { grid-column: auto; }
      header { align-items: flex-start; }
      header .user-info { flex-wrap: wrap; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="app"><div class="loading">Loading...</div></div>
  </div>

  <script>
    const THEME_KEY = 'theme';

    function resolveTheme(theme) {
      if (theme === 'dark') return 'synthwave-dark';
      if (theme === 'system') {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'synthwave-dark' : 'light';
      }
      return theme || 'synthwave-dark';
    }

    function applyTheme(theme) {
      const resolved = resolveTheme(theme);
      if (resolved === 'light') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', resolved);
      }
    }

    function setTheme(theme) {
      localStorage.setItem(THEME_KEY, theme);
      applyTheme(theme);
    }

    function getSavedTheme() {
      const saved = localStorage.getItem(THEME_KEY) || 'synthwave-dark';
      return saved === 'dark' ? 'synthwave-dark' : saved;
    }

    function renderThemeControl() {
      const currentTheme = getSavedTheme();
      const options = [
        ['synthwave-dark', 'Synthwave'],
        ['solarized-dark', 'Solarized Dark'],
        ['solarized-light', 'Solarized Light'],
        ['light', 'Light'],
        ['system', 'System'],
      ];
      return '<div class="theme-control"><span class="theme-label">Theme</span><select class="theme-select" onchange="setTheme(this.value)">' +
        options.map(([value, label]) => '<option value="' + value + '"' + (currentTheme === value ? ' selected' : '') + '>' + label + '</option>').join('') +
        '</select></div>';
    }

    function renderCopyIconButton(url) {
      return '<button type="button" class="copy-btn icon-btn" title="Copy short link" aria-label="Copy short link" data-copy-url="' + escapeAttr(url) + '" onclick="copyUrl(this)">' +
        '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 1H6c-1.1 0-2 .9-2 2v14h2V3h10V1Zm3 4H10c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h9c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2Zm0 16H10V7h9v14Z"/></svg>' +
        '</button>';
    }

    applyTheme(getSavedTheme());

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (getSavedTheme() === 'system') applyTheme('system');
    });

    const SUPABASE_URL = 'https://dumhbtxskncofwwzrmfx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bWhidHhza25jb2Z3d3pybWZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTk0MzcsImV4cCI6MjA4ODkzNTQzN30.kYLAKAtgA18pyQxp1RzmPnmySdXtxDrTkgs5qlB2fXY';
    const DOMAIN = 'aicoe.fit';

    let sb;
    try {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      document.getElementById('app').innerHTML = '<div class="error-box">Failed to initialize Supabase client: <code>' + e.message + '</code></div>';
      throw e;
    }

    const app = document.getElementById('app');

    let currentPerson = null;
    let showAll = false;
    let searchQuery = '';
    let dashboardData = null;
    let dashboardLoaded = false;
    let dashboardLoading = false;
    let mySources = [];
    let sourceComposerOpen = false;
    let sourceSaving = false;
    let sourceNotice = '';
    let semanticSearch = false;
    let semanticResults = null; // null = not active, [] = no results, [...] = results
    let semanticLoading = false;
    let semanticError = '';
    let searchDebounceTimer = null;
    let authorDropdownOpen = false;
    let authorDropdownItems = [];
    let authorDropdownIndex = -1;
    let embedRunning = false;
    let embedNotice = '';
    let syncRunning = false;
    let syncNotice = '';
    let sourceDraft = {
      icon: '',
      label: '',
      source: 'linkedin',
      medium: 'social',
      content: '',
      term: '',
    };
    let analyticsInterval = 'day';
    let analyticsLinkFilter = '';
    let analyticsVariantFilter = '';
    let analyticsStartDate = '';
    let analyticsEndDate = '';
    let analyticsChart = null;
    let analyticsLoading = false;

    async function rerenderDashboard() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) await renderDashboard(session);
    }

    async function refreshDashboardData() {
      const [linksResult, variantsResult, clicksResult] = await Promise.all([
        sb.from('links').select('*').order('published_at', { ascending: false, nullsFirst: false }),
        fetchAllRows('tracking_variants', '*', 'created_at'),
        fetchAllRows('click_log', 'id, variant_id, link_id', 'clicked_at'),
      ]);

      if (linksResult.error) throw linksResult.error;
      dashboardData = {
        links: linksResult.data || [],
        variants: variantsResult || [],
        clicks: clicksResult || [],
      };
    }

    function resetSourceDraft() {
      sourceDraft = {
        icon: '',
        label: '',
        source: 'linkedin',
        medium: 'social',
        content: '',
        term: '',
      };
    }

    function toggleSourceComposer() {
      sourceComposerOpen = !sourceComposerOpen;
      if (!sourceComposerOpen) resetSourceDraft();
      rerenderDashboard();
    }

    function setSourceDraftField(field, value) {
      sourceDraft[field] = value;
    }

    function escapeAttr(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function fuzzyMatch(text, query) {
      const haystack = String(text || '').toLowerCase();
      const needle = String(query || '').trim().toLowerCase();
      if (!needle) return true;
      if (haystack.includes(needle)) return true;

      let index = 0;
      for (const char of haystack) {
        if (char === needle[index]) index += 1;
        if (index === needle.length) return true;
      }
      return false;
    }

    function setSearchQuery(value) {
      searchQuery = value;
      if (semanticSearch && value.trim().length >= 3) {
        // Debounce semantic search calls
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => performSemanticSearch(value), 400);
      } else {
        semanticResults = null;
        semanticError = '';
      }
      // Author '@' mention dropdown
      const atIdx = value.lastIndexOf('@');
      if (atIdx !== -1) {
        const authorQuery = value.substring(atIdx + 1).toLowerCase();
        const allAuthors = [...new Set((dashboardData && dashboardData.links || []).map(l => l.author).filter(Boolean))].sort();
        authorDropdownItems = allAuthors.filter(a => a.toLowerCase().includes(authorQuery));
        authorDropdownOpen = authorDropdownItems.length > 0;
        authorDropdownIndex = -1;
      } else {
        authorDropdownOpen = false;
        authorDropdownItems = [];
        authorDropdownIndex = -1;
      }
      rerenderDashboard();
    }

    function selectAuthor(author) {
      const atIdx = searchQuery.lastIndexOf('@');
      if (atIdx !== -1) {
        searchQuery = searchQuery.substring(0, atIdx) + '@' + author;
      } else {
        searchQuery = '@' + author;
      }
      authorDropdownOpen = false;
      authorDropdownItems = [];
      authorDropdownIndex = -1;
      rerenderDashboard();
    }

    function handleFilterKeydown(event) {
      if (!authorDropdownOpen) return;
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        authorDropdownIndex = Math.min(authorDropdownIndex + 1, authorDropdownItems.length - 1);
        rerenderDashboard();
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        authorDropdownIndex = Math.max(authorDropdownIndex - 1, 0);
        rerenderDashboard();
      } else if (event.key === 'Enter' && authorDropdownIndex >= 0) {
        event.preventDefault();
        selectAuthor(authorDropdownItems[authorDropdownIndex]);
      } else if (event.key === 'Escape') {
        event.preventDefault();
        authorDropdownOpen = false;
        authorDropdownItems = [];
        authorDropdownIndex = -1;
        rerenderDashboard();
      }
    }

    function closeAuthorDropdown() {
      if (authorDropdownOpen) {
        authorDropdownOpen = false;
        authorDropdownItems = [];
        authorDropdownIndex = -1;
        rerenderDashboard();
      }
    }

    function toggleSemanticSearch() {
      semanticSearch = !semanticSearch;
      if (semanticSearch && searchQuery.trim().length >= 3) {
        performSemanticSearch(searchQuery);
      } else {
        semanticResults = null;
        semanticError = '';
      }
      rerenderDashboard();
    }

    async function performSemanticSearch(query) {
      if (!query.trim() || query.trim().length < 3) return;
      semanticLoading = true;
      semanticError = '';
      rerenderDashboard();

      try {
        const { data: { session } } = await sb.auth.getSession();
        const headers = {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
        };
        if (session) {
          headers['Authorization'] = 'Bearer ' + session.access_token;
        }

        const resp = await fetch(SUPABASE_URL + '/functions/v1/search-articles', {
          method: 'POST',
          headers,
          body: JSON.stringify({
            query: query.trim(),
            match_threshold: 0.25,
            match_count: 30,
          }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ error: 'Search failed' }));
          throw new Error(err.error || 'Search failed');
        }

        const result = await resp.json();
        // Build a map of article IDs to similarity scores
        semanticResults = {};
        for (const r of (result.results || [])) {
          semanticResults[r.id] = r.similarity;
        }
      } catch (err) {
        console.error('Semantic search error:', err);
        semanticError = err.message;
        semanticResults = null;
      } finally {
        semanticLoading = false;
        rerenderDashboard();
      }
    }

    async function runEmbedArticles() {
      if (embedRunning) return;
      embedRunning = true;
      embedNotice = '';
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { embedRunning = false; return; }

      rerenderDashboard();

      try {
        const resp = await fetch(SUPABASE_URL + '/functions/v1/embed-articles', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + session.access_token },
        });
        const result = await resp.json();
        if (!resp.ok) throw new Error(result.error || 'Embedding failed');
        embedNotice = result.message || ('Embedded ' + (result.embedded || 0) + ' articles');
      } catch (err) {
        embedNotice = 'Embed error: ' + err.message;
        console.error(err);
      } finally {
        embedRunning = false;
        rerenderDashboard();
        setTimeout(() => { embedNotice = ''; rerenderDashboard(); }, 6000);
      }
    }

    async function fetchAllRows(table, columns, orderColumn, options = {}) {
      const pageSize = 1000;
      const rows = [];
      const seenIds = new Set();
      let from = 0;

      while (true) {
        let query = sb
          .from(table)
          .select(columns)
          .order(orderColumn, options)
          .order('id', { ascending: true })
          .range(from, from + pageSize - 1);
        const { data, error } = await query;
        if (error) throw error;
        const batch = data || [];
        for (const row of batch) {
          if (row && row.id && seenIds.has(row.id)) continue;
          if (row && row.id) seenIds.add(row.id);
          rows.push(row);
        }
        if (batch.length < pageSize) break;
        from += pageSize;
      }

      return rows;
    }

    function getVariantSourceMeta(variant) {
      if (!variant || !variant.ref || !currentPerson || variant.ref !== currentPerson.slug) return null;
      const key = formatSourceKey(variant.utm_source, variant.utm_medium, variant.utm_content, variant.utm_term);
      return mySources.find((s) => formatSourceKey(s.utm_source, s.utm_medium, s.utm_content, s.utm_term) === key) || null;
    }

    function renderSourceSummary(variant) {
      const meta = getVariantSourceMeta(variant);
      if (meta) {
        return '<span class="source-pill">' + renderBrandIcon(meta.utm_source, meta.icon) + '<span>' + meta.label + '</span></span>';
      }
      const bits = [variant.utm_source, variant.utm_medium, variant.utm_content, variant.utm_term].filter(Boolean);
      return '<span class="source-pill">' + renderBrandIcon(variant.utm_source) + '<span>' + (bits.join(' / ') || '-') + '</span></span>';

    async function saveSource() {
      if (sourceSaving) return;
      sourceSaving = true;
      try {
        const { data, error } = await sb.rpc('create_person_source', {
          p_label: sourceDraft.label,
          p_source: sourceDraft.source,
          p_medium: sourceDraft.medium,
          p_content: sourceDraft.content || null,
          p_term: sourceDraft.term || null,
          p_icon: sourceDraft.icon || null,
        });
        if (error) throw error;

        const { data: sourcesData, error: sourcesErr } = await sb.from('person_sources').select('*').order('created_at');
        if (sourcesErr) throw sourcesErr;
        mySources = sourcesData || [];
        const sourceName = sourceDraft.label || sourceDraft.source;
        sourceComposerOpen = false;
        resetSourceDraft();
        sourceNotice = 'Saved "' + sourceName + '" and generated ' + ((data && data.generated_links) || 'all') + ' tracking links for existing articles. Future articles will get this source automatically too.';
        dashboardData = null;
        await rerenderDashboard();
      } catch (err) {
        alert('Unable to save source: ' + err.message);
      } finally {
        sourceSaving = false;
      }
    }

    async function removeSource(sourceId) {
      const source = mySources.find((s) => s.id === sourceId);
      const label = source ? source.label : 'this source';
      if (!confirm('Remove source "' + label + '"? Existing links will keep working, but new articles will stop auto-generating for it.')) {
        return;
      }
      const { error } = await sb.rpc('delete_person_source', { p_source_id: sourceId });
      if (error) {
        alert('Unable to remove source: ' + error.message);
        return;
      }
      mySources = mySources.filter((s) => s.id !== sourceId);
      sourceNotice = 'Removed "' + label + '" from your active sources. Existing links still work, but new articles will no longer auto-generate for it.';
      dashboardData = null;
      await rerenderDashboard();
    }

        if (analyticsLinkFilter) params.p_link_id = analyticsLinkFilter;

        if (analyticsStartDate) params.p_start_date = new Date(analyticsStartDate).toISOString();
        if (analyticsEndDate) params.p_end_date = new Date(analyticsEndDate + 'T23:59:59').toISOString();
        
        const { data, error } = await sb.rpc('get_click_analytics', params);

    function formatChartDate(date, interval) {
      const d = new Date(date);
      if (interval === 'hour') {
        return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric' });
      } else if (interval === 'week') {
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' week';
      } else if (interval === 'month') {
        return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
      }
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getChartColors() {
      const style = getComputedStyle(document.documentElement);
      const accent = style.getPropertyValue('--accent').trim() || '#2563eb';
      return {
        border: accent,
        background: accent + '33',
        grid: style.getPropertyValue('--border-faint').trim() || '#f3f4f6',
        text: style.getPropertyValue('--text-muted').trim() || '#666',
      };
    }

    async function renderAnalyticsChart() {
      const canvas = document.getElementById('analytics-canvas');
      if (!canvas) return;
      
      const data = await loadAnalyticsData();
      const ctx = canvas.getContext('2d');
      const colors = getChartColors();
      
      if (analyticsChart) {
        analyticsChart.destroy();
      }
      
      const labels = data.map(d => formatChartDate(d.period, analyticsInterval));
      const values = data.map(d => d.clicks);
      
      analyticsChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Clicks',
            data: values,
            borderColor: colors.border,
            backgroundColor: colors.background,
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointHoverRadius: 5,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(0,0,0,0.8)',
              titleFont: { size: 12 },
              bodyFont: { size: 12 },
              padding: 10,
            }
          },
          scales: {
            x: {
              grid: { color: colors.grid },
              ticks: { color: colors.text, font: { size: 10 } }
            },
            y: {
              beginAtZero: true,
              grid: { color: colors.grid },
              ticks: { color: colors.text, font: { size: 10 }, stepSize: 1 }
            }
          }
        }
      });
    }

    async function refreshArticles() {
      if (syncRunning) return;
      syncRunning = true;
      syncNotice = '';
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { syncRunning = false; return; }

      // Re-render to show loading state
      await renderDashboard(session, false);

      try {
        const resp = await fetch(SUPABASE_URL + '/functions/v1/sync-substack?force=true', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + session.access_token },
        });
        const result = await resp.json();
        if (!resp.ok) throw new Error(result.error || 'Sync failed');

        const createdCount = (result.created || []).length;
        const updatedCount = (result.updated || []).length;
        syncNotice = createdCount + ' created, ' + updatedCount + ' updated';

        // Refresh dashboard data to reflect changes
        await loadDashboard(session);
      } catch (err) {
        syncNotice = 'Sync error: ' + err.message;
        console.error(err);
      } finally {
        syncRunning = false;
        const { data: { session: s } } = await sb.auth.getSession();
        if (s) await renderDashboard(s, false);
        // Clear notice after 6 seconds
        setTimeout(() => { syncNotice = ''; }, 6000);
      }
    }

    async function loadDashboard(session) {
      if (dashboardLoading) return;
      dashboardLoading = true;

      // Only show loading spinner on first load, not on re-renders
      if (!dashboardLoaded) {
        app.innerHTML = '<div class="loading">Loading dashboard...</div>';
      }

      try {
        if (!currentPerson) {
          const { data: person, error: personErr } = await sb.rpc('get_or_create_person');
          if (personErr) throw personErr;
          currentPerson = person;
        }

        const { data: sourcesData, error: sourcesErr } = await sb.from('person_sources').select('*').order('created_at');
        if (sourcesErr) throw sourcesErr;
        mySources = sourcesData || [];

        await renderDashboard(session, true);
        dashboardLoaded = true;
      } catch (err) {
        app.innerHTML = '<div class="error-box">Error loading dashboard: <code>' + err.message + '</code></div>';
        console.error(err);
      } finally {
        dashboardLoading = false;
      }
    }

    async function renderDashboard(session, forceRefresh) {
      const activeElement = document.activeElement;
      const shouldRestoreFilterFocus = activeElement && activeElement.classList && activeElement.classList.contains('filter-input');
      const filterSelection = shouldRestoreFilterFocus ? {
        start: activeElement.selectionStart,
        end: activeElement.selectionEnd,
        direction: activeElement.selectionDirection,
      } : null;

      const user = session.user;
      const avatarUrl = user.user_metadata?.avatar_url || '';
      const displayName = currentPerson.name || user.email;

      if (forceRefresh || !dashboardData) {
        await refreshDashboardData();
      }

      const links = dashboardData.links;
      const variants = dashboardData.variants;
      const clicks = dashboardData.clicks;

      const clicksByVariant = {};
      const clicksByLink = {};
      (clicks || []).forEach(c => {
        if (c.variant_id) {
          clicksByVariant[c.variant_id] = (clicksByVariant[c.variant_id] || 0) + 1;
        }
        clicksByLink[c.link_id] = (clicksByLink[c.link_id] || 0) + 1;
      });

      const variantsByLink = {};
      (variants || []).forEach(v => {
        if (!variantsByLink[v.link_id]) variantsByLink[v.link_id] = [];
        variantsByLink[v.link_id].push(v);
      });

      const mySlug = currentPerson.slug;
      let displayLinks = links || [];
      if (!showAll) {
        displayLinks = displayLinks.filter(link => {
          const lvs = variantsByLink[link.id] || [];
          return lvs.some(v => v.ref === mySlug);
        });
      }

      if (searchQuery.trim()) {
        // Extract author filter from '@mention' if present
        let textQuery = searchQuery;
        let authorFilter = null;
        const atIdx = searchQuery.lastIndexOf('@');
        if (atIdx !== -1) {
          authorFilter = searchQuery.substring(atIdx + 1).trim().toLowerCase();
          textQuery = searchQuery.substring(0, atIdx).trim();
        }

        if (authorFilter) {
          displayLinks = displayLinks.filter(link =>
            link.author && link.author.toLowerCase().startsWith(authorFilter)
          );
        }

        if (textQuery) {
          if (semanticSearch && semanticResults && Object.keys(semanticResults).length > 0) {
            // Semantic search: filter to matched articles and sort by similarity
            displayLinks = displayLinks.filter(link => link.id in semanticResults);
            displayLinks.sort((a, b) => (semanticResults[b.id] || 0) - (semanticResults[a.id] || 0));
          } else {
            // Fuzzy search fallback
            displayLinks = displayLinks.filter(link => {
              const searchText = [link.title, link.author, link.slug].filter(Boolean).join(' ');
              return fuzzyMatch(searchText, textQuery);
            });
          }
        } else if (!authorFilter) {
          if (semanticSearch && semanticResults && Object.keys(semanticResults).length > 0) {
            displayLinks = displayLinks.filter(link => link.id in semanticResults);
            displayLinks.sort((a, b) => (semanticResults[b.id] || 0) - (semanticResults[a.id] || 0));
          }
        }
      }

      const myVariants = (variants || []).filter(v => v.ref === mySlug);
      const myClicks = myVariants.reduce((sum, v) => sum + (clicksByVariant[v.id] || 0), 0);
      const myArticleCount = new Set(myVariants.map(v => v.link_id)).size;

      let h = `
        <header>
          <h1>aicoe.fit</h1>
          <div class="user-info">
            ${avatarUrl ? '<img src="' + avatarUrl + '" alt="">' : ''}
            ${displayName}
            <button class="btn btn-sm btn-primary" onclick="refreshArticles()" ${syncRunning ? 'disabled' : ''}>${syncRunning ? 'Syncing...' : 'Refresh Articles'}</button>
            <button class="btn btn-sm btn-secondary" onclick="runEmbedArticles()" ${embedRunning ? 'disabled' : ''} title="Generate embeddings for semantic search">${embedRunning ? 'Embedding...' : 'Embed Articles'}</button>
            <button class="btn btn-sm btn-secondary" onclick="signOut()">Sign out</button>
            ${renderThemeControl()}
          </div>
        </header>
        ${syncNotice ? '<div class="notice" style="background:var(--badge-bg);color:var(--badge-text);padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:0.9em;">' + syncNotice + '</div>' : ''}
        ${embedNotice ? '<div class="notice" style="background:var(--badge-bg);color:var(--badge-text);padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:0.9em;">' + embedNotice + '</div>' : ''}

        <div class="stats-row">
          <div class="stat-card">
            <div class="num">${myArticleCount}</div>
            <div class="label">My Articles</div>
          </div>
          <div class="stat-card">
            <div class="num">${mySources.length}</div>
            <div class="label">My Sources</div>
          </div>
          <div class="stat-card">
            <div class="num">${myClicks}</div>
            <div class="label">My Clicks</div>
          </div>
        </div>

        <div class="analytics-panel">
          <div class="analytics-header">
            <div class="analytics-title">Click Analytics Over Time</div>
            <div class="analytics-filters">
              <select class="analytics-select" onchange="setAnalyticsInterval(this.value)">
                <option value="hour" ${analyticsInterval === 'hour' ? 'selected' : ''}>Hourly</option>
                <option value="day" ${analyticsInterval === 'day' ? 'selected' : ''}>Daily</option>
                <option value="week" ${analyticsInterval === 'week' ? 'selected' : ''}>Weekly</option>
                <option value="month" ${analyticsInterval === 'month' ? 'selected' : ''}>Monthly</option>
              </select>
              <select class="analytics-select" onchange="setAnalyticsLinkFilter(this.value)">
                <option value="">All Links</option>
                ${(dashboardData.links || []).map(l => `<option value="${l.id}" ${analyticsLinkFilter === l.id ? 'selected' : ''}>${l.title || l.slug}</option>`).join('')}
              </select>
              ${analyticsLinkFilter ? `
                <select class="analytics-select" onchange="setAnalyticsVariantFilter(this.value)">
                  <option value="">All Variants</option>
                  ${(dashboardData.variants || []).filter(v => v.link_id === analyticsLinkFilter).map(v => `<option value="${v.id}" ${analyticsVariantFilter === v.id ? 'selected' : ''}>${v.ref || 'unknown'} - ${v.utm_source || ''}</option>`).join('')}
                </select>
              ` : ''}
              <input type="date" class="analytics-input" value="${analyticsStartDate}" onchange="setAnalyticsStartDate(this.value)" title="Start date" placeholder="From">
              <input type="date" class="analytics-input" value="${analyticsEndDate}" onchange="setAnalyticsEndDate(this.value)" title="End date" placeholder="To">
            </div>
          </div>
          <div class="chart-container">
            <canvas id="analytics-canvas"></canvas>
          </div>
        </div>

        <div class="sources-panel">
          <div class="sources-header">
            <div>
              <div class="sources-title">My Sources</div>
              <div class="sources-subtitle">Each source auto-generates tracking links for every article, including older ones.</div>
            </div>
            <button class="btn btn-sm btn-secondary" onclick="toggleSourceComposer()">${sourceComposerOpen ? 'Close' : 'Add Source'}</button>
          </div>
          <div class="source-chip-list">
            ${mySources.map(source => `
              <div class="source-chip">
                ${renderBrandIcon(source.utm_source, source.icon)}
                <span>${source.label}</span>
                <span class="meta">${[source.utm_source, source.utm_medium, source.utm_content, source.utm_term].filter(Boolean).join(' / ')}</span>
                <button class="remove" onclick="removeSource('${source.id}')" title="Remove source">×</button>
              </div>
            `).join('')}
          </div>
          ${sourceComposerOpen ? `
            <div class="source-form">
              <input class="source-input" placeholder="Icon" value="${escapeAttr(sourceDraft.icon)}" oninput="setSourceDraftField('icon', this.value)">
              <input class="source-input wide" placeholder="Name (e.g. Discord - AI Builders)" value="${escapeAttr(sourceDraft.label)}" oninput="setSourceDraftField('label', this.value)">
              <input class="source-input" placeholder="source (e.g. discord)" value="${escapeAttr(sourceDraft.source)}" oninput="setSourceDraftField('source', this.value)">
              <input class="source-input" placeholder="medium (usually social)" value="${escapeAttr(sourceDraft.medium)}" oninput="setSourceDraftField('medium', this.value)">
              <input class="source-input wide" placeholder="channel / group / community (utm_content)" value="${escapeAttr(sourceDraft.content)}" oninput="setSourceDraftField('content', this.value)">
              <input class="source-input" placeholder="extra tag (utm_term)" value="${escapeAttr(sourceDraft.term)}" oninput="setSourceDraftField('term', this.value)">
            </div>
            <div class="source-explainer">
              <div class="source-explainer-title">How This Works</div>
              <p>A source profile defines one share channel you want to track across every article. When you click <strong>Save source</strong>, the app immediately generates a new tracking link for all existing articles, and all future articles will get one automatically.</p>
              <ul>
                <li><strong>Name</strong>: what you want to see in the dashboard, like <code>Discord - AI Builders</code> or <code>LinkedIn - Fintech Founders</code>.</li>
                <li><strong>source</strong>: the platform or top-level channel, like <code>linkedin</code>, <code>discord</code>, <code>x</code>, or <code>youtube</code>.</li>
                <li><strong>medium</strong>: usually <code>social</code>.</li>
                <li><strong>channel / group / community</strong> goes into <code>utm_content</code> and is the main field to use when you want multiple tracked links for the same platform.</li>
                <li><strong>extra tag</strong> goes into <code>utm_term</code> and is optional extra segmentation beyond the community itself.</li>
              </ul>
              <p>Example: if you already have a default <code>Discord</code> source, add <code>Discord - AI CoE General</code> with <code>source=discord</code> and <code>channel / group / community=ai-coe-general</code>. That creates a separate Discord community profile and retroactively generates links for every article.</p>
            </div>
            <div class="source-actions">
              <button class="btn btn-sm btn-primary" onclick="saveSource()">${sourceSaving ? 'Saving...' : 'Save source'}</button>
              <span class="source-hint">Known brands like LinkedIn, X, YouTube, and Discord use matching icons automatically. Add a custom emoji for anything else.</span>
            </div>
          ` : ''}
          ${sourceNotice ? `<div class="source-notice">${sourceNotice}</div>` : ''}
        </div>

        <div class="toggle-bar">
          <button class="btn btn-sm ${showAll ? 'btn-secondary' : 'btn-primary'}" onclick="toggleView(false)">My Links</button>
          <button class="btn btn-sm ${showAll ? 'btn-primary' : 'btn-secondary'}" onclick="toggleView(true)">All Links</button>
          <div class="filter-input-wrap">
            <input class="filter-input" placeholder="${semanticSearch ? 'Semantic search (3+ chars)...' : 'Filter by title, slug, or @author...'}" value="${escapeAttr(searchQuery)}" oninput="setSearchQuery(this.value)" onkeydown="handleFilterKeydown(event)" onblur="setTimeout(closeAuthorDropdown, 150)">
            ${authorDropdownOpen ? `<div class="author-dropdown">${authorDropdownItems.map((a, i) => `<div class="author-dropdown-item${i === authorDropdownIndex ? ' active' : ''}" data-author="${escapeAttr(a)}" onmousedown="selectAuthor(this.dataset.author)">${escapeAttr(a)}</div>`).join('')}</div>` : ''}
          </div>
          <button class="btn btn-sm ${semanticSearch ? 'btn-primary' : 'btn-secondary'}" onclick="toggleSemanticSearch()" title="Toggle AI-powered semantic search">
            ${semanticLoading ? '⏳' : '🔍'} Semantic
          </button>
          <span class="filter-meta">${displayLinks.length} shown${semanticSearch && semanticResults ? ' (by relevance)' : ''}</span>
        </div>
        ${semanticError ? '<div class="error-box" style="margin-bottom:16px;padding:10px 14px;font-size:0.85em;">Semantic search error: <code>' + semanticError + '</code>. Falling back to fuzzy filter.</div>' : ''}
      `;

      // In "All Links" view, show copy-table buttons per person
      if (showAll) {
        const allPeopleRefs = [...new Set((variants || []).map(v => v.ref).filter(Boolean))].sort();
        h += `<div class="copy-table-bar">
          <span class="label">Copy all links for:</span>
          ${allPeopleRefs.map(ref => `<button class="person-btn" onclick="copyTableForPerson(this, '${ref}')">${ref}</button>`).join('')}
        </div>`;
      }

      if (displayLinks.length === 0) {
        h += '<div class="link-card"><p style="color:#999">No links yet. Create some with the CLI.</p></div>';
      }

      // Store data globally so copyTableForPerson can access it
      window._dashData = { links: links || [], variants: variants || [], variantsByLink, clicksByVariant, clicksByLink };

      for (const link of displayLinks) {
        const lvs = variantsByLink[link.id] || [];
        const variantClicks = lvs.reduce((s, v) => s + (clicksByVariant[v.id] || 0), 0);
        const directClicks = (clicksByLink[link.id] || 0) - variantClicks;

        const displayVariants = showAll ? lvs : lvs.filter(v => v.ref === mySlug);

        const pubDate = link.published_at ? new Date(link.published_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
        const displayTitle = link.title || link.slug;
        const authorStr = link.author ? `<span class="author">${link.author}</span>` : '';
        const similarityScore = semanticSearch && semanticResults && semanticResults[link.id]
          ? `<span class="badge" style="background:var(--copied-bg);color:var(--copied-text);margin-left:8px;font-size:0.75em">${Math.round(semanticResults[link.id] * 100)}% match</span>`
          : '';

        h += `
          <div class="link-card">
            <div class="title">${displayTitle}${similarityScore}</div>
            <div class="meta">${authorStr}${authorStr && pubDate ? ' &middot; ' : ''}${pubDate}</div>
            <div class="dest"><a href="${link.destination_url}" target="_blank" rel="noopener">${link.destination_url}</a></div>
            <div style="margin-bottom:8px">
              <span class="short-url-wrap">
                <a class="short-url" href="https://${DOMAIN}/${link.slug}" target="_blank" rel="noopener">https://${DOMAIN}/${link.slug}</a>
                ${renderCopyIconButton(`https://${DOMAIN}/${link.slug}`)}
              </span>
              <span style="margin-left:8px; font-size:0.85em; color:#666">${directClicks > 0 ? directClicks + ' direct clicks' : ''}</span>
            </div>
        `;

        if (displayVariants.length > 0) {
          // Store card data for copy function
          const cardId = 'card-' + link.id.replace(/-/g, '');
          window._cardData = window._cardData || {};
          window._cardData[cardId] = {
            title: displayTitle,
            author: link.author || '',
            pubDate,
            destUrl: link.destination_url,
            slug: link.slug,
            variants: displayVariants.map(v => ({
              ref: v.ref,
              url: 'https://' + DOMAIN + '/' + link.slug + '-' + v.suffix,
              sourceLabel: (() => {
                const meta = getVariantSourceMeta(v);
                return meta ? meta.label : [v.utm_source, v.utm_medium, v.utm_content, v.utm_term].filter(Boolean).join(' / ');
              })(),
              clicks: clicksByVariant[v.id] || 0,
            })),
          };

          h += `
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px">
              <span style="font-size:0.8em; color:#888; font-weight:500">Tracking variants</span>
              <button class="copy-btn" onclick="copyCardTable(this, '${cardId}')">Copy table</button>
            </div>
            <table class="variant-table">
              <thead><tr><th>Person</th><th>Short URL</th><th>Source</th><th>Clicks</th></tr></thead>
              <tbody>
          `;
          for (const v of displayVariants) {
            const isMine = v.ref === mySlug;
            const url = 'https://' + DOMAIN + '/' + link.slug + '-' + v.suffix;
            const vc = clicksByVariant[v.id] || 0;
            h += `
              <tr class="${isMine ? 'mine' : ''}">
                <td>${v.ref || '-'} ${isMine ? '<span class="badge badge-you">you</span>' : ''}</td>
                <td><span class="short-url-wrap"><a class="short-url" href="${url}" target="_blank" rel="noopener">${url}</a>${renderCopyIconButton(url)}</span></td>
                <td>${renderSourceSummary(v)}</td>
                <td class="clicks">${vc}</td>
              </tr>
            `;
          }
          h += '</tbody></table>';
        }

        h += '</div>';
      }

      app.innerHTML = h;

      renderAnalyticsChart();

      if (shouldRestoreFilterFocus) {
        const filterInput = app.querySelector('.filter-input');
        if (filterInput) {
          filterInput.focus({ preventScroll: true });
          if (filterSelection && filterSelection.start !== null && filterSelection.end !== null) {
            filterInput.setSelectionRange(filterSelection.start, filterSelection.end, filterSelection.direction || 'none');
          }
        }
      }
    }

    async function toggleView(all) {
      showAll = all;
      const { data: { session } } = await sb.auth.getSession();
      if (session) await renderDashboard(session);
    }

    function copyUrl(btn) {
      const url = btn.getAttribute('data-copy-url');
      if (!url) return;
      navigator.clipboard.writeText(url).then(() => {
        const originalHtml = btn.innerHTML;
        const originalTitle = btn.getAttribute('title') || '';
        btn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>';
        btn.setAttribute('title', 'Copied');
        btn.setAttribute('aria-label', 'Copied');
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = originalHtml;
          btn.setAttribute('title', originalTitle || 'Copy short link');
          btn.setAttribute('aria-label', originalTitle || 'Copy short link');
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function copyCardTable(btn, cardId) {
      const data = window._cardData[cardId];
      if (!data) return;

      // Rich HTML table for Google Chat
      let html = '<b>' + data.title + '</b><br>';
      html += '<i>' + data.author + (data.pubDate ? ' - ' + data.pubDate : '') + '</i><br>';
      html += '<a href="' + data.destUrl + '">' + data.destUrl + '</a><br><br>';
      html += '<table border="1" cellpadding="4" cellspacing="0" style="border-collapse:collapse">';
      html += '<thead><tr><th>Person</th><th>Short URL</th><th>Source</th><th>Clicks</th></tr></thead><tbody>';
      for (const v of data.variants) {
        html += '<tr><td>' + v.ref + '</td><td><a href="' + v.url + '">' + v.url + '</a></td><td>' + v.sourceLabel + '</td><td>' + v.clicks + '</td></tr>';
      }
      html += '</tbody></table>';

      // Plain text fallback
      let text = data.title + '\n' + data.author + (data.pubDate ? ' - ' + data.pubDate : '') + '\n' + data.destUrl + '\n\n';
      text += '| Person | Short URL | Source | Clicks |\n|--------|-----------|--------|--------|\n';
      for (const v of data.variants) {
        text += '| ' + v.ref + ' | ' + v.url + ' | ' + v.sourceLabel + ' | ' + v.clicks + ' |\n';
      }

      const htmlBlob = new Blob([html], { type: 'text/html' });
      const textBlob = new Blob([text], { type: 'text/plain' });
      navigator.clipboard.write([new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob })]).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy table';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function copyTableForPerson(btn, personRef) {
      const { links, variantsByLink } = window._dashData;

      // Build rows: Title | Date | Source | Short URL
      const rows = [];
      for (const link of links) {
        const lvs = variantsByLink[link.id] || [];
        const title = link.title || link.slug;
        const pubDate = link.published_at ? new Date(link.published_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
        const author = link.author || '';
        for (const variant of lvs.filter(v => v.ref === personRef)) {
          const shortUrl = 'https://' + DOMAIN + '/' + link.slug + '-' + variant.suffix;
          const rawSource = [variant.utm_source, variant.utm_medium, variant.utm_content, variant.utm_term].filter(Boolean).join(' / ');
          const meta = currentPerson && personRef === currentPerson.slug ? getVariantSourceMeta(variant) : null;
          rows.push({
            title,
            author,
            pubDate,
            shortUrl,
            source: meta ? meta.label : rawSource,
            destUrl: link.destination_url,
          });
        }
      }

      if (rows.length === 0) {
        alert('No links found for ' + personRef);
        return;
      }

      // Build rich HTML table (for pasting into Google Chat / Docs)
      let html = '<table><thead><tr><th>Title</th><th>Author</th><th>Date</th><th>Source</th><th>Short Link</th></tr></thead><tbody>';
      for (const r of rows) {
        html += '<tr>';
        html += '<td><a href="' + r.destUrl + '">' + r.title + '</a></td>';
        html += '<td>' + r.author + '</td>';
        html += '<td>' + r.pubDate + '</td>';
        html += '<td>' + r.source + '</td>';
        html += '<td><a href="' + r.shortUrl + '">' + r.shortUrl + '</a></td>';
        html += '</tr>';
      }
      html += '</tbody></table>';

      // Build plain text markdown table as fallback
      let md = '| Title | Author | Date | Source | Short Link |\n';
      md += '|-------|--------|------|--------|------------|\n';
      for (const r of rows) {
        md += '| ' + r.title + ' | ' + r.author + ' | ' + r.pubDate + ' | ' + r.source + ' | ' + r.shortUrl + ' |\n';
      }

      // Copy as both HTML and plain text
      const blob = new Blob([html], { type: 'text/html' });
      const textBlob = new Blob([md], { type: 'text/plain' });
      const item = new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob });
      navigator.clipboard.write([item]).then(() => {
        btn.textContent = 'Copied ' + rows.length + ' links!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = personRef;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    init();
  </script>
</body>
</html>
