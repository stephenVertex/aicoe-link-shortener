<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aicoe.fit - Link Dashboard</title>
  <script src="./supabase.min.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #333;
      --text-muted: #666;
      --text-faint: #888;
      --text-title: #111;
      --card-bg: white;
      --card-shadow: rgba(0,0,0,0.08);
      --border: #e0e0e0;
      --border-light: #e5e7eb;
      --border-faint: #f3f4f6;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --author: #6b21a8;
      --clicks: #059669;
      --badge-bg: #dbeafe;
      --badge-text: #1e40af;
      --mine-bg: #eff6ff;
      --btn-secondary-bg: #e5e7eb;
      --btn-secondary-text: #374151;
      --btn-secondary-hover: #d1d5db;
      --copy-btn-border: #d1d5db;
      --copy-btn-hover: #f3f4f6;
      --copied-bg: #dcfce7;
      --copied-border: #86efac;
      --copied-text: #166534;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
      --error-code-bg: #fee2e2;
      --google-bg: white;
      --google-border: #dadce0;
      --google-text: #3c4043;
      --google-hover: #f8f9fa;
      --stat-num: #2563eb;
    }
    html.dark {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --text-muted: #a0a0b8;
      --text-faint: #707088;
      --text-title: #ff6ec7;
      --card-bg: #16213e;
      --card-shadow: rgba(0,0,0,0.4);
      --border: #2a2a4a;
      --border-light: #252545;
      --border-faint: #202040;
      --accent: #00d4ff;
      --accent-hover: #33ddff;
      --author: #bf6aff;
      --clicks: #72f1b8;
      --badge-bg: #1a1a3e;
      --badge-text: #00d4ff;
      --mine-bg: #1a2438;
      --btn-secondary-bg: #252545;
      --btn-secondary-text: #e0e0e0;
      --btn-secondary-hover: #2a2a5a;
      --copy-btn-border: #3a3a5a;
      --copy-btn-hover: #252545;
      --copied-bg: #1a2e2a;
      --copied-border: #72f1b8;
      --copied-text: #72f1b8;
      --error-bg: #2e1a1a;
      --error-border: #6a3a3a;
      --error-text: #ff6ec7;
      --error-code-bg: #3a1a2a;
      --google-bg: #16213e;
      --google-border: #3a3a5a;
      --google-text: #e0e0e0;
      --google-hover: #1a2a4e;
      --stat-num: #ff6ec7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
    header h1 { font-size: 1.4em; font-weight: 700; }
    header .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.9em; color: var(--text-muted); }
    header .user-info img { width: 32px; height: 32px; border-radius: 50%; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--btn-secondary-bg); color: var(--btn-secondary-text); }
    .btn-secondary:hover { background: var(--btn-secondary-hover); }
    .btn-sm { padding: 4px 10px; font-size: 0.8em; }
    .btn-google { background: var(--google-bg); border: 1px solid var(--google-border); color: var(--google-text); padding: 12px 24px; font-size: 1em; display: flex; align-items: center; gap: 10px; margin: 40vh auto 0; border-radius: 6px; cursor: pointer; }
    .btn-google:hover { background: var(--google-hover); box-shadow: 0 1px 3px var(--card-shadow); }
    .btn-google svg { width: 20px; height: 20px; }
    .toggle-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
    .link-card { background: var(--card-bg); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 3px var(--card-shadow); }
    .link-card h3 { font-size: 1.1em; margin-bottom: 4px; }
    .link-card .title { font-size: 0.95em; color: var(--text-title); margin-bottom: 2px; }
    .link-card .meta { font-size: 0.8em; color: var(--text-faint); margin-bottom: 8px; }
    .link-card .meta .author { color: var(--author); font-weight: 500; }
    .link-card .dest { font-size: 0.85em; color: var(--text-muted); margin-bottom: 12px; word-break: break-all; }
    .link-card .dest a { color: var(--accent); text-decoration: none; }
    .link-card .dest a:hover { text-decoration: underline; }
    .copy-table-bar { background: var(--card-bg); border-radius: 8px; padding: 12px 20px; margin-bottom: 16px; box-shadow: 0 1px 3px var(--card-shadow); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .copy-table-bar .label { font-size: 0.9em; font-weight: 500; color: var(--text-muted); }
    .person-btn { padding: 4px 12px; border: 1px solid var(--copy-btn-border); border-radius: 4px; background: var(--card-bg); cursor: pointer; font-size: 0.8em; color: var(--btn-secondary-text); transition: all 0.15s; }
    .person-btn:hover { background: var(--copy-btn-hover); border-color: var(--text-muted); }
    .person-btn.copied { background: var(--copied-bg); border-color: var(--copied-border); color: var(--copied-text); }
    .variant-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    .variant-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border-light); color: var(--text-muted); font-weight: 500; }
    .variant-table td { padding: 6px 8px; border-bottom: 1px solid var(--border-faint); }
    .variant-table tr.mine { background: var(--mine-bg); }
    .short-url { font-family: monospace; font-size: 0.9em; color: var(--accent); text-decoration: none; }
    .short-url:hover { text-decoration: underline; }
    .copy-btn { background: none; border: 1px solid var(--copy-btn-border); border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 0.8em; color: var(--text-muted); }
    .copy-btn:hover { background: var(--copy-btn-hover); }
    .copy-btn.copied { background: var(--copied-bg); border-color: var(--copied-border); color: var(--copied-text); }
    .clicks { font-weight: 600; color: var(--clicks); }
    .loading { text-align: center; padding: 60px; color: var(--text-faint); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: 500; }
    .badge-you { background: var(--badge-bg); color: var(--badge-text); }
    #app { min-height: 60vh; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border-radius: 8px; padding: 16px 20px; box-shadow: 0 1px 3px var(--card-shadow); flex: 1; text-align: center; }
    .stat-card .num { font-size: 2em; font-weight: 700; color: var(--stat-num); }
    .stat-card .label { font-size: 0.85em; color: var(--text-muted); margin-top: 4px; }
    .error-box { background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 8px; padding: 16px; margin: 20px 0; color: var(--error-text); }
    .error-box code { background: var(--error-code-bg); padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
    /* Dark mode toggle */
    .theme-toggle { position: relative; width: 44px; height: 24px; border-radius: 12px; background: var(--btn-secondary-bg); border: 1px solid var(--border); cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
    .theme-toggle .knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: white; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    html.dark .theme-toggle { background: #ff6ec7; border-color: #ff6ec7; }
    html.dark .theme-toggle .knob { transform: translateX(20px); background: #1a1a2e; }
    .theme-label { font-size: 0.75em; color: var(--text-faint); }
  </style>
</head>
<body>
  <div class="container">
    <div id="app"><div class="loading">Loading...</div></div>
  </div>

  <script>
    // Dark mode - apply saved preference before first paint
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    const themeToggleHtml = '<div style="display:flex;align-items:center;gap:6px"><span class="theme-label">Dark</span><div class="theme-toggle" onclick="toggleTheme()"><div class="knob"></div></div></div>';

    const SUPABASE_URL = 'https://dumhbtxskncofwwzrmfx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bWhidHhza25jb2Z3d3pybWZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTk0MzcsImV4cCI6MjA4ODkzNTQzN30.kYLAKAtgA18pyQxp1RzmPnmySdXtxDrTkgs5qlB2fXY';
    const DOMAIN = 'aicoe.fit';

    let sb;
    try {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      document.getElementById('app').innerHTML = '<div class="error-box">Failed to initialize Supabase client: <code>' + e.message + '</code></div>';
      throw e;
    }

    const app = document.getElementById('app');

    let currentPerson = null;
    let showAll = false;
    let dashboardLoaded = false;
    let dashboardLoading = false;

    async function init() {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          await loadDashboard(session);
        } else {
          showLogin();
        }

        sb.auth.onAuthStateChange(async (event, session) => {
          if (event === 'SIGNED_IN' && session && !dashboardLoaded) {
            await loadDashboard(session);
          } else if (event === 'SIGNED_OUT') {
            dashboardLoaded = false;
            currentPerson = null;
            showLogin();
          }
        });
      } catch (err) {
        app.innerHTML = '<div class="error-box">Initialization error: <code>' + err.message + '</code></div>';
        console.error(err);
      }
    }

    function showLogin() {
      app.innerHTML = `
        <header><h1>aicoe.fit</h1>${themeToggleHtml}</header>
        <button class="btn btn-google" onclick="signIn()">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </button>
      `;
    }

    async function signIn() {
      const currentUrl = window.location.origin + window.location.pathname;
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: currentUrl }
      });
      if (error) alert('Sign in failed: ' + error.message);
    }

    async function signOut() {
      await sb.auth.signOut();
      showLogin();
    }

    async function loadDashboard(session) {
      if (dashboardLoading) return;
      dashboardLoading = true;

      // Only show loading spinner on first load, not on re-renders
      if (!dashboardLoaded) {
        app.innerHTML = '<div class="loading">Loading dashboard...</div>';
      }

      try {
        if (!currentPerson) {
          const { data: person, error: personErr } = await sb.rpc('get_or_create_person');
          if (personErr) throw personErr;
          currentPerson = person;
        }

        await renderDashboard(session);
        dashboardLoaded = true;
      } catch (err) {
        app.innerHTML = '<div class="error-box">Error loading dashboard: <code>' + err.message + '</code></div>';
        console.error(err);
      } finally {
        dashboardLoading = false;
      }
    }

    async function renderDashboard(session) {
      const user = session.user;
      const avatarUrl = user.user_metadata?.avatar_url || '';
      const displayName = currentPerson.name || user.email;

      const { data: links } = await sb.from('links').select('*').order('published_at', { ascending: false, nullsFirst: false });
      const { data: variants } = await sb.from('tracking_variants').select('*').order('created_at');
      const { data: clicks } = await sb.from('click_log').select('variant_id, link_id');

      const clicksByVariant = {};
      const clicksByLink = {};
      (clicks || []).forEach(c => {
        if (c.variant_id) {
          clicksByVariant[c.variant_id] = (clicksByVariant[c.variant_id] || 0) + 1;
        }
        clicksByLink[c.link_id] = (clicksByLink[c.link_id] || 0) + 1;
      });

      const variantsByLink = {};
      (variants || []).forEach(v => {
        if (!variantsByLink[v.link_id]) variantsByLink[v.link_id] = [];
        variantsByLink[v.link_id].push(v);
      });

      const mySlug = currentPerson.slug;
      let displayLinks = links || [];
      if (!showAll) {
        displayLinks = displayLinks.filter(link => {
          const lvs = variantsByLink[link.id] || [];
          return lvs.some(v => v.ref === mySlug);
        });
      }

      const myVariants = (variants || []).filter(v => v.ref === mySlug);
      const myClicks = myVariants.reduce((sum, v) => sum + (clicksByVariant[v.id] || 0), 0);
      const totalClicks = (clicks || []).length;

      let h = `
        <header>
          <h1>aicoe.fit</h1>
          <div class="user-info">
            ${avatarUrl ? '<img src="' + avatarUrl + '" alt="">' : ''}
            ${displayName}
            <button class="btn btn-sm btn-secondary" onclick="signOut()">Sign out</button>
            ${themeToggleHtml}
          </div>
        </header>

        <div class="stats-row">
          <div class="stat-card">
            <div class="num">${myVariants.length}</div>
            <div class="label">My Links</div>
          </div>
          <div class="stat-card">
            <div class="num">${myClicks}</div>
            <div class="label">My Clicks</div>
          </div>
          <div class="stat-card">
            <div class="num">${totalClicks}</div>
            <div class="label">Total Clicks</div>
          </div>
        </div>

        <div class="toggle-bar">
          <button class="btn btn-sm ${showAll ? 'btn-secondary' : 'btn-primary'}" onclick="toggleView(false)">My Links</button>
          <button class="btn btn-sm ${showAll ? 'btn-primary' : 'btn-secondary'}" onclick="toggleView(true)">All Links</button>
        </div>
      `;

      // In "All Links" view, show copy-table buttons per person
      if (showAll) {
        const allPeopleRefs = [...new Set((variants || []).map(v => v.ref).filter(Boolean))].sort();
        h += `<div class="copy-table-bar">
          <span class="label">Copy all links for:</span>
          ${allPeopleRefs.map(ref => `<button class="person-btn" onclick="copyTableForPerson(this, '${ref}')">${ref}</button>`).join('')}
        </div>`;
      }

      if (displayLinks.length === 0) {
        h += '<div class="link-card"><p style="color:#999">No links yet. Create some with the CLI.</p></div>';
      }

      // Store data globally so copyTableForPerson can access it
      window._dashData = { links: links || [], variants: variants || [], variantsByLink, clicksByVariant, clicksByLink };

      for (const link of displayLinks) {
        const lvs = variantsByLink[link.id] || [];
        const variantClicks = lvs.reduce((s, v) => s + (clicksByVariant[v.id] || 0), 0);
        const directClicks = (clicksByLink[link.id] || 0) - variantClicks;

        const displayVariants = showAll ? lvs : lvs.filter(v => v.ref === mySlug);

        const pubDate = link.published_at ? new Date(link.published_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
        const displayTitle = link.title || link.slug;
        const authorStr = link.author ? `<span class="author">${link.author}</span>` : '';

        h += `
          <div class="link-card">
            <div class="title">${displayTitle}</div>
            <div class="meta">${authorStr}${authorStr && pubDate ? ' &middot; ' : ''}${pubDate}</div>
            <div class="dest"><a href="${link.destination_url}" target="_blank" rel="noopener">${link.destination_url}</a></div>
            <div style="margin-bottom:8px">
              <a class="short-url" href="https://${DOMAIN}/${link.slug}" target="_blank" rel="noopener">https://${DOMAIN}/${link.slug}</a>
              <button class="copy-btn" onclick="copyUrl(this, 'https://${DOMAIN}/${link.slug}')">Copy</button>
              <span style="margin-left:8px; font-size:0.85em; color:#666">${directClicks > 0 ? directClicks + ' direct clicks' : ''}</span>
            </div>
        `;

        if (displayVariants.length > 0) {
          // Store card data for copy function
          const cardId = 'card-' + link.id.replace(/-/g, '');
          window._cardData = window._cardData || {};
          window._cardData[cardId] = {
            title: displayTitle,
            author: link.author || '',
            pubDate,
            destUrl: link.destination_url,
            slug: link.slug,
            variants: displayVariants.map(v => ({
              ref: v.ref,
              url: 'https://' + DOMAIN + '/' + link.slug + '-' + v.suffix,
              clicks: clicksByVariant[v.id] || 0,
            })),
          };

          h += `
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px">
              <span style="font-size:0.8em; color:#888; font-weight:500">Tracking variants</span>
              <button class="copy-btn" onclick="copyCardTable(this, '${cardId}')">Copy table</button>
            </div>
            <table class="variant-table">
              <thead><tr><th>Person</th><th>Short URL</th><th>Source</th><th>Clicks</th><th></th></tr></thead>
              <tbody>
          `;
          for (const v of displayVariants) {
            const isMine = v.ref === mySlug;
            const url = 'https://' + DOMAIN + '/' + link.slug + '-' + v.suffix;
            const vc = clicksByVariant[v.id] || 0;
            h += `
              <tr class="${isMine ? 'mine' : ''}">
                <td>${v.ref || '-'} ${isMine ? '<span class="badge badge-you">you</span>' : ''}</td>
                <td><a class="short-url" href="${url}" target="_blank" rel="noopener">${url}</a></td>
                <td>${v.utm_source || '-'} / ${v.utm_medium || '-'}</td>
                <td class="clicks">${vc}</td>
                <td><button class="copy-btn" onclick="copyUrl(this, '${url}')">Copy</button></td>
              </tr>
            `;
          }
          h += '</tbody></table>';
        }

        h += '</div>';
      }

      app.innerHTML = h;
    }

    async function toggleView(all) {
      showAll = all;
      const { data: { session } } = await sb.auth.getSession();
      if (session) await renderDashboard(session);
    }

    function copyUrl(btn, url) {
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function copyCardTable(btn, cardId) {
      const data = window._cardData[cardId];
      if (!data) return;

      // Rich HTML table for Google Chat
      let html = '<b>' + data.title + '</b><br>';
      html += '<i>' + data.author + (data.pubDate ? ' - ' + data.pubDate : '') + '</i><br>';
      html += '<a href="' + data.destUrl + '">' + data.destUrl + '</a><br><br>';
      html += '<table border="1" cellpadding="4" cellspacing="0" style="border-collapse:collapse">';
      html += '<thead><tr><th>Person</th><th>Short URL</th><th>Clicks</th></tr></thead><tbody>';
      for (const v of data.variants) {
        html += '<tr><td>' + v.ref + '</td><td><a href="' + v.url + '">' + v.url + '</a></td><td>' + v.clicks + '</td></tr>';
      }
      html += '</tbody></table>';

      // Plain text fallback
      let text = data.title + '\n' + data.author + (data.pubDate ? ' - ' + data.pubDate : '') + '\n' + data.destUrl + '\n\n';
      text += '| Person | Short URL | Clicks |\n|--------|-----------|--------|\n';
      for (const v of data.variants) {
        text += '| ' + v.ref + ' | ' + v.url + ' | ' + v.clicks + ' |\n';
      }

      const htmlBlob = new Blob([html], { type: 'text/html' });
      const textBlob = new Blob([text], { type: 'text/plain' });
      navigator.clipboard.write([new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob })]).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy table';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function copyTableForPerson(btn, personRef) {
      const { links, variantsByLink } = window._dashData;

      // Build rows: Title | Date | Short URL
      const rows = [];
      for (const link of links) {
        const lvs = variantsByLink[link.id] || [];
        const variant = lvs.find(v => v.ref === personRef);
        if (!variant) continue;
        const shortUrl = 'https://' + DOMAIN + '/' + link.slug + '-' + variant.suffix;
        const title = link.title || link.slug;
        const pubDate = link.published_at ? new Date(link.published_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
        const author = link.author || '';
        rows.push({ title, author, pubDate, shortUrl, destUrl: link.destination_url });
      }

      if (rows.length === 0) {
        alert('No links found for ' + personRef);
        return;
      }

      // Build rich HTML table (for pasting into Google Chat / Docs)
      let html = '<table><thead><tr><th>Title</th><th>Author</th><th>Date</th><th>Short Link</th></tr></thead><tbody>';
      for (const r of rows) {
        html += '<tr>';
        html += '<td><a href="' + r.destUrl + '">' + r.title + '</a></td>';
        html += '<td>' + r.author + '</td>';
        html += '<td>' + r.pubDate + '</td>';
        html += '<td><a href="' + r.shortUrl + '">' + r.shortUrl + '</a></td>';
        html += '</tr>';
      }
      html += '</tbody></table>';

      // Build plain text markdown table as fallback
      let md = '| Title | Author | Date | Short Link |\n';
      md += '|-------|--------|------|------------|\n';
      for (const r of rows) {
        md += '| ' + r.title + ' | ' + r.author + ' | ' + r.pubDate + ' | ' + r.shortUrl + ' |\n';
      }

      // Copy as both HTML and plain text
      const blob = new Blob([html], { type: 'text/html' });
      const textBlob = new Blob([md], { type: 'text/plain' });
      const item = new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob });
      navigator.clipboard.write([item]).then(() => {
        btn.textContent = 'Copied ' + rows.length + ' links!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = personRef;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    init();
  </script>
</body>
</html>
