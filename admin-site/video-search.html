<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aicoe.fit - Video Search</title>
  <script src="./supabase.min.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #333;
      --text-muted: #666;
      --text-faint: #888;
      --text-title: #111;
      --card-bg: white;
      --card-shadow: rgba(0,0,0,0.08);
      --border: #e0e0e0;
      --border-light: #e5e7eb;
      --border-faint: #f3f4f6;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --ok: #059669;
      --copied-bg: #dcfce7;
      --copied-border: #86efac;
      --copied-text: #166534;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
      --btn-secondary-bg: #e5e7eb;
      --btn-secondary-text: #374151;
      --btn-secondary-hover: #d1d5db;
      --copy-btn-border: #d1d5db;
      --copy-btn-hover: #f3f4f6;
      --stat-num: #2563eb;
    }
    html[data-theme="synthwave-dark"] {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --text-muted: #a0a0b8;
      --text-faint: #707088;
      --text-title: #ff6ec7;
      --card-bg: #16213e;
      --card-shadow: rgba(0,0,0,0.4);
      --border: #2a2a4a;
      --border-light: #252545;
      --border-faint: #202040;
      --accent: #00d4ff;
      --accent-hover: #33ddff;
      --ok: #72f1b8;
      --copied-bg: #1a2e2a;
      --copied-border: #72f1b8;
      --copied-text: #72f1b8;
      --error-bg: #2e1a1a;
      --error-border: #6a3a3a;
      --error-text: #ff6ec7;
      --btn-secondary-bg: #252545;
      --btn-secondary-text: #e0e0e0;
      --btn-secondary-hover: #2a2a5a;
      --copy-btn-border: #3a3a5a;
      --copy-btn-hover: #252545;
      --stat-num: #ff6ec7;
    }
    html[data-theme="solarized-dark"] {
      --bg: #002b36;
      --text: #93a1a1;
      --text-muted: #839496;
      --text-faint: #657b83;
      --text-title: #b58900;
      --card-bg: #073642;
      --card-shadow: rgba(0,0,0,0.28);
      --border: #0d4a59;
      --border-light: #114b59;
      --border-faint: #0c4250;
      --accent: #268bd2;
      --accent-hover: #3aa0e8;
      --ok: #2aa198;
      --copied-bg: #123f40;
      --copied-border: #2aa198;
      --copied-text: #7ee5dd;
      --error-bg: #3a2323;
      --error-border: #6d3f3f;
      --error-text: #dc322f;
      --btn-secondary-bg: #11404d;
      --btn-secondary-text: #93a1a1;
      --btn-secondary-hover: #15505f;
      --copy-btn-border: #1a5564;
      --copy-btn-hover: #11404d;
      --stat-num: #b58900;
    }
    html[data-theme="solarized-light"] {
      --bg: #fdf6e3;
      --text: #586e75;
      --text-muted: #657b83;
      --text-faint: #93a1a1;
      --text-title: #b58900;
      --card-bg: #fffdf4;
      --card-shadow: rgba(88,110,117,0.12);
      --border: #eee8d5;
      --border-light: #e6dfca;
      --border-faint: #f2ecdc;
      --accent: #268bd2;
      --accent-hover: #1f76b4;
      --ok: #2aa198;
      --copied-bg: #e6f4ef;
      --copied-border: #9dd7c5;
      --copied-text: #20756d;
      --error-bg: #fff1f0;
      --error-border: #f3c7c2;
      --error-text: #b8332f;
      --btn-secondary-bg: #eee8d5;
      --btn-secondary-text: #586e75;
      --btn-secondary-hover: #e6dfca;
      --copy-btn-border: #d8d2c0;
      --copy-btn-hover: #f2ecdc;
      --stat-num: #b58900;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
    header h1 { font-size: 1.4em; font-weight: 700; }
    header .header-left { display: flex; align-items: center; gap: 0; }
    .nav-links { display: flex; align-items: center; gap: 4px; margin-left: 16px; }
    .nav-link { padding: 4px 12px; font-size: 0.85em; font-weight: 500; color: var(--text-muted); text-decoration: none; border-radius: 6px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .nav-link:hover { background: var(--copy-btn-hover); color: var(--text); }
    .nav-link.active { background: var(--accent); color: white; border-color: var(--accent); }
    .theme-control { display: inline-flex; align-items: center; gap: 6px; }
    .theme-label { font-size: 0.75em; color: var(--text-faint); }
    .theme-select { background: var(--card-bg); border: 1px solid var(--border-light); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 0.8em; }
    
    .search-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px var(--card-shadow); }
    .search-input-wrap { display: flex; gap: 10px; }
    .search-input-wrap input { flex: 1; padding: 14px 18px; border: 2px solid var(--border-light); border-radius: 8px; font-size: 1.1em; background: var(--card-bg); color: var(--text); transition: border-color 0.2s; }
    .search-input-wrap input:focus { outline: none; border-color: var(--accent); }
    .search-input-wrap button { padding: 14px 28px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .search-input-wrap button:hover { background: var(--accent-hover); }
    .search-input-wrap button:disabled { background: var(--btn-secondary-bg); cursor: not-allowed; color: var(--text-muted); }
    
    .examples { margin-top: 12px; color: var(--text-muted); font-size: 0.85em; }
    .examples span { cursor: pointer; color: var(--accent); margin-right: 8px; }
    .examples span:hover { text-decoration: underline; }
    
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .results-header h2 { font-size: 1.1em; color: var(--text-muted); }
    .results-header .count { font-weight: 400; color: var(--accent); }
    
    .results-list { display: flex; flex-direction: column; gap: 16px; }
    
    .result-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px var(--card-shadow); display: flex; transition: box-shadow 0.2s; }
    .result-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .result-thumb { width: 200px; flex-shrink: 0; position: relative; background: #eee; }
    .result-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .result-thumb .timestamp { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; font-weight: 600; }
    .result-content { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .result-title { font-weight: 600; font-size: 1.05em; margin-bottom: 6px; color: var(--text); text-decoration: none; display: block; }
    .result-title:hover { color: var(--accent); }
    .result-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
    .result-similarity { background: var(--copied-bg); color: var(--copied-text); padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
    .result-time { color: var(--text-muted); font-size: 0.85em; }
    .result-text { color: var(--text-muted); font-size: 0.9em; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .result-text mark { background: #fef08a; padding: 0 2px; border-radius: 2px; }
    
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty h3 { margin-bottom: 8px; color: var(--text); }
    
    .error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    
    @media (max-width: 600px) {
      .result-card { flex-direction: column; }
      .result-thumb { width: 100%; height: 180px; }
    }
  </style>
</head>
<body>
  <div class="container">
  <header>
    <div class="header-left">
      <h1>🔍 Video Search — aicoe.fit</h1>
      <div class="nav-links">
        <a class="nav-link" href="./index.html">Links</a>
        <a class="nav-link" href="./index.html#/analytics">Analytics</a>
        <a class="nav-link" href="./sync.html">Sync</a>
        <a class="nav-link active">Video Search</a>
      </div>
    </div>
    <div class="theme-control">
      <span class="theme-label">Theme</span>
      <select class="theme-select" id="theme-select" onchange="setTheme(this.value)"></select>
    </div>
  </header>

  <div id="app">
    <div class="search-box">
      <div class="search-input-wrap">
        <input type="text" id="search-input" placeholder="Search videos by meaning... e.g. 'discussing AI agents'" autofocus>
        <button id="search-btn" onclick="doSearch()">Search</button>
      </div>
      <div class="examples">
        Try: 
        <span onclick="setSearch('cursor')">cursor tips</span>
        <span onclick="setSearch('AI agents')">AI agents</span>
        <span onclick="setSearch('coding assistants')">coding assistants</span>
        <span onclick="setSearch('prompt engineering')">prompt engineering</span>
      </div>
    </div>
    
    <div id="results-area"></div>
  </div>
</div>

<script>
const THEME_KEY = 'theme';

function resolveTheme(theme) {
  if (theme === 'dark') return 'synthwave-dark';
  if (theme === 'system') {
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'synthwave-dark' : 'light';
  }
  return theme || 'synthwave-dark';
}

function applyTheme(theme) {
  const resolved = resolveTheme(theme);
  if (resolved === 'light') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', resolved);
  }
}

function setTheme(theme) {
  localStorage.setItem(THEME_KEY, theme);
  applyTheme(theme);
  populateThemeSelect();
}

function getSavedTheme() {
  const saved = localStorage.getItem(THEME_KEY) || 'synthwave-dark';
  return saved === 'dark' ? 'synthwave-dark' : saved;
}

function populateThemeSelect() {
  const currentTheme = getSavedTheme();
  const options = [
    ['synthwave-dark', 'Synthwave'],
    ['solarized-dark', 'Solarized Dark'],
    ['solarized-light', 'Solarized Light'],
    ['light', 'Light'],
    ['system', 'System'],
  ];
  const select = document.getElementById('theme-select');
  if (!select) return;
  select.innerHTML = options.map(([value, label]) =>
    '<option value="' + value + '"' + (currentTheme === value ? ' selected' : '') + '>' + label + '</option>'
  ).join('');
}

applyTheme(getSavedTheme());
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (getSavedTheme() === 'system') applyTheme('system');
});

const SUPABASE_URL = 'https://dumhbtxskncofwwzrmfx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bWhidHhza25jb2Z3d3pybWZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTk0MzcsImV4cCI6MjA4ODkzNTQzN30.kYLAKAtgA18pyQxp1RzmPnmySdXtxDrTkgs5qlB2fXY';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

populateThemeSelect();

document.getElementById('search-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});

function setSearch(q) {
  document.getElementById('search-input').value = q;
  doSearch();
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  
  const btn = document.getElementById('search-btn');
  const resultsArea = document.getElementById('results-area');
  
  btn.disabled = true;
  btn.textContent = 'Searching...';
  resultsArea.innerHTML = '<div class="loading">Searching videos...</div>';
  
  try {
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/search-articles?q=${encodeURIComponent(query)}&content_type=video`, {
      headers: { 'apikey': SUPABASE_ANON_KEY }
    });
    
    const data = await resp.json();
    
    if (data.error) {
      throw new Error(data.error);
    }
    
    renderResults(query, data.results || []);
  } catch (err) {
    resultsArea.innerHTML = `<div class="error">Error: ${escHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function renderResults(query, results) {
  const resultsArea = document.getElementById('results-area');
  
  if (results.length === 0) {
    resultsArea.innerHTML = `
      <div class="empty">
        <h3>No results found</h3>
        <p>Try a different search term or check back later.</p>
      </div>`;
    return;
  }
  
  const header = `
    <div class="results-header">
      <h2>Found <span class="count">${results.length}</span> result${results.length === 1 ? '' : 's'}</h2>
    </div>`;
  
  const cards = results.map(r => {
    const simPercent = Math.round(r.similarity * 100);
    const ytId = extractYouTubeId(r.destination_url || '');
    const thumbnail = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : null;
    const videoLink = r.video_url || (ytId ? `https://www.youtube.com/watch?v=${ytId}${r.start_time != null ? `&t=${r.start_time}` : ''}` : r.destination_url || `https://aicoe.fit/${r.slug}`);
    const tsLabel = r.start_time != null ? formatTime(r.start_time) : '';
    const chunkText = r.text ? highlightMatch(r.text, query) : '';
    return `
      <div class="result-card">
        <a href="${escHtml(videoLink)}" target="_blank" class="result-thumb">
          ${thumbnail ? `<img src="${escHtml(thumbnail)}" alt="Thumbnail" loading="lazy">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#999;">No preview</div>'}
          ${tsLabel ? `<span class="timestamp">${escHtml(tsLabel)}</span>` : ''}
        </a>
        <div class="result-content">
          <a href="${escHtml(videoLink)}" target="_blank" class="result-title">${escHtml(r.title || r.slug)}</a>
          <div class="result-meta">
            <span class="result-similarity">${simPercent}% match</span>
            ${tsLabel ? `<span class="result-time">at ${escHtml(tsLabel)}</span>` : ''}
          </div>
          ${chunkText ? `<div class="result-text">${chunkText}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  
  resultsArea.innerHTML = header + `<div class="results-list">${cards}</div>`;
}

function extractYouTubeId(url) {
  const match = url.match(/[?&]v=([^&]+)/);
  return match ? match[1] : null;
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function highlightMatch(text, query) {
  const esc = escHtml(text);
  const words = query.trim().split(/\s+/).filter(w => w.length > 1);
  let result = esc;
  for (const w of words) {
    const re = new RegExp(`(${escHtml(w)})`, 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  }
  return result;
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
