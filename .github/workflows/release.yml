name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build wheel and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        working-directory: user-cli
        run: |
          uv build --wheel
          echo "WHEEL_FILE=$(ls dist/*.whl | head -1)" >> "$GITHUB_ENV"

      - name: Rename wheel to generic name
        run: |
          cp "$WHEEL_FILE" user-cli/dist/als-py3-none-any.whl
          echo "GENERIC_WHEEL=user-cli/dist/als-py3-none-any.whl" >> "$GITHUB_ENV"

      - name: Create GitHub release and upload wheel
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.GENERIC_WHEEL }}
          generate_release_notes: true

      - name: Deploy Cloudflare Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
