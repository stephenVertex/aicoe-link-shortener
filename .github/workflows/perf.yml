name: Performance Benchmark

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Manual trigger
  push:
    tags:
      - 'v*'              # Also run on releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: als CLI performance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install als CLI
        working-directory: user-cli
        run: |
          uv venv .venv
          uv pip install -e . --python .venv/bin/python
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Configure als credentials
        run: |
          cat > ~/.als.credentials <<CREDS
          [default]
          api_key = ${{ secrets.ALS_API_KEY }}
          author_name = Stephen Barr
          CREDS
          chmod 600 ~/.als.credentials

      - name: Run performance benchmark
        run: >
          python user-cli/tests/perf_bench.py
          --json perf-results.json
          --markdown perf-summary.md

      - name: Run performance benchmark (with shorten)
        if: github.event_name == 'workflow_dispatch'
        run: >
          python user-cli/tests/perf_bench.py
          --include-shorten
          --json perf-results-full.json
          --markdown perf-summary-full.md

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: perf-results-${{ github.run_number }}
          path: |
            perf-results*.json
            perf-summary*.md
          retention-days: 90
